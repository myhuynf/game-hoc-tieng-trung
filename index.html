<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Tiếng Trung của Nga 🌿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header Tối ưu --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: var(--white-glass);
            width: 100%;
            backdrop-filter: blur(10px);
            border-bottom: 4px solid var(--ghibli-green);
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 100;
        }

        h1 { 
            color: var(--ghibli-dark-green); 
            margin: 0; 
            font-size: clamp(1.8rem, 5vw, 2.8rem); /* Chữ tự co giãn */
        }

        .welcome-quote {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            margin: 15px 0 25px;
            color: var(--ghibli-dark-green);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        /* --- Thanh Tìm Kiếm & Jiji --- */
        .search-wrapper {
            position: relative;
            width: 90%;
            max-width: 450px; /* Độ dài tối đa trên máy tính */
            margin: 0 auto;
        }

        .jiji-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background-image: url('https://i.pinimg.com/originals/14/7b/9e/147b9e078028972e9a26569130761e01.png');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 10;
            pointer-events: none;
            transition: 0.3s;
        }

        /* Animation Jiji vẫy đuôi */
        @keyframes jijiWag {
            0% { transform: translateY(-50%) rotate(0deg); }
            20% { transform: translateY(-50%) rotate(-12deg); }
            40% { transform: translateY(-50%) rotate(10deg); }
            60% { transform: translateY(-50%) rotate(-8deg); }
            80% { transform: translateY(-50%) rotate(5deg); }
            100% { transform: translateY(-50%) rotate(0deg); }
        }

        #gameSearch:focus + .jiji-icon {
            animation: jijiWag 0.8s ease-in-out infinite;
        }

        #gameSearch {
            width: 100%;
            padding: 14px 20px 14px 55px;
            border-radius: 30px;
            border: 3px solid var(--ghibli-green);
            background: white;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px; /* Chống zoom trên Mobile */
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 4px 4px 0px var(--ghibli-green);
        }

        #gameSearch:focus {
            border-color: var(--ghibli-dark-green);
            box-shadow: 2px 2px 0px var(--ghibli-dark-green);
            transform: scale(1.02);
        }

        /* --- Grid Bài Học (Responsive) --- */
        .container {
            display: grid;
            /* Mặc định: 2 cột cho điện thoại */
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1100px;
            padding: 40px 0 60px;
        }

        /* Tablet: 3 cột */
        @media (min-width: 600px) {
            .container { grid-template-columns: repeat(3, 1fr); }
        }

        /* Desktop: 4-5 cột */
        @media (min-width: 900px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .game-card:hover { transform: translateY(-10px) rotate(2deg); }
        }

        .game-card {
            background: var(--white-glass);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--ghibli-wood);
            border: 2px solid transparent;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .game-card:hover {
            border-color: var(--ghibli-green);
            background: white;
            box-shadow: 0 10px 25px rgba(157, 193, 131, 0.3);
        }

        .game-icon { 
            font-size: clamp(35px, 6vw, 50px); 
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .game-title { 
            font-weight: 600; 
            font-size: clamp(0.85rem, 2vw, 1.05rem); 
            line-height: 1.3;
        }

        /* Footer nhỏ cho khu vườn */
        footer {
            margin-top: auto;
            padding: 20px;
            color: var(--ghibli-dark-green);
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <h1>Khu Vườn Của Nga 🌿</h1>
    <p class="welcome-quote">
        Mỗi ngày học một chút tiếng Trung,<br>như gieo một hạt mầm bình yên vào khu vườn tâm hồn.
    </p>

    <div class="search-wrapper">
        <input type="text" id="gameSearch" placeholder="Tìm bài học của Nga..." autocomplete="off">
        <div class="jiji-icon"></div>
    </div>
</header>

<div class="container" id="gameContainer">
    <a href="BO THU 1.html" class="game-card">
        <div class="game-icon">🌱</div>
        <div class="game-title">BỘ THỦ 1</div>
    </a>
    
    <a href="HSK1-LESSON11.html" class="game-card">
        <div class="game-icon">⏰</div>
        <div class="game-title">HSK1: Bài 11</div>
    </a>

    <a href="#" class="game-card">
        <div class="game-icon">🌾</div>
        <div class="game-title">HSK 1: Từ vựng</div>
    </a>

    <a href="#" class="game-card">
        <div class="game-icon">🎋</div>
        <div class="game-title">Ngữ pháp HSK</div>
    </a>

    <a href="#" class="game-card">
        <div class="game-icon">🚲</div>
        <div class="game-title">Giao tiếp hằng ngày</div>
    </a>

    <a href="#" class="game-card">
        <div class="game-icon">🏯</div>
        <div class="game-title">Văn hóa Trung Hoa</div>
    </a>
</div>

<footer>© 2026 - Khu vườn Ghibli của Nga</footer>

<script>
    const searchInput = document.getElementById('gameSearch');
    const cards = document.querySelectorAll('.game-card');

    searchInput.addEventListener('input', function() {
        const term = searchInput.value.toLowerCase().trim();
        
        cards.forEach(card => {
            const title = card.querySelector('.game-title').innerText.toLowerCase();
            // Hiệu ứng ẩn hiện mượt mà
            if(title.includes(term)) {
                card.style.display = "flex";
                card.style.opacity = "1";
            } else {
                card.style.display = "none";
                card.style.opacity = "0";
            }
        });
    });
</script>

</body>
</html>
