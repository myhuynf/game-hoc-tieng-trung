<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 4: 她是我的汉语老师</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid var(--ghibli-green);
            position: relative;
        }

        /* Intro Screen */
        #intro-screen h1 { color: var(--ghibli-dark-green); font-size: 2rem; }
        .teacher-badge {
            display: inline-block;
            background: var(--ghibli-pink);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Quiz Screen */
        #quiz-screen, #result-screen { display: none; }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: var(--ghibli-leaf);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            color: var(--ghibli-wood);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--ghibli-leaf);
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: 600;
        }

        .option-btn:hover { background: var(--ghibli-green); color: white; }
        .option-btn.correct { background: var(--ghibli-dark-green) !important; color: white !important; border-color: var(--ghibli-dark-green) !important; }
        .option-btn.wrong { background: #ff6b6b !important; color: white !important; border-color: #ff6b6b !important; }

        .btn-main {
            background: var(--ghibli-wood);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-main:hover { background: var(--ghibli-dark-green); transform: scale(1.05); }

        .feedback {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 25px;
        }
        .feedback.success { color: var(--ghibli-dark-green); }
        .feedback.error { color: #d63031; }

        /* Return Link */
        .home-link {
            display: block;
            margin-top: 20px;
            color: var(--ghibli-wood);
            text-decoration: none;
            font-weight: bold;
        }
        .home-link:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <div id="intro-screen">
        <div class="teacher-badge">🌸 Giáo viên: Nga Học HSK</div>
        <h1>Bài 4: 她是我的汉语老师</h1>
        <p>Chào mừng bạn đến với bài kiểm tra HSK1 - Bài 4.<br>Cùng ôn lại từ vựng và các đoạn hội thoại nhé!</p>
        <p><i>Lưu ý: Bật âm thanh để trải nghiệm tốt hơn 🔊</i></p>
        <button class="btn-main" onclick="startQuiz()">Bắt đầu ngay 🌱</button>
        <a href="index.html" class="home-link">⬅ Trở về Vườn</a>
    </div>

    <div id="quiz-screen">
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="question-count" style="color: gray; margin-bottom: 10px;">Câu 1 / 20</div>
        <div class="question-text" id="question-text">Câu hỏi hiển thị ở đây</div>
        <div class="options-grid" id="options-grid">
            </div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="btn-main" style="display: none;" onclick="nextQuestion()">Câu tiếp theo ➡</button>
    </div>

    <div id="result-screen">
        <h1>🎉 Hoàn thành xuất sắc!</h1>
        <h2 id="final-score" style="color: var(--ghibli-dark-green);">Bạn đúng 0/20 câu</h2>
        <p id="result-message"></p>
        <button class="btn-main" onclick="location.reload()">Chơi lại 🔄</button>
        <a href="index.html" class="home-link">⬅ Trở về Vườn</a>
    </div>

</div>

<script>
    // Cấu hình âm thanh (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'correct') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        } else {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
    }

    // Danh sách 20 câu hỏi
    const questions = [
        { q: "Đại từ 'Cô ấy, bà ấy' trong tiếng Trung là gì?", options: ["他 (tā)", "她 (tā)", "我 (wǒ)", "你 (nǐ)"], answer: 1 },
        { q: "Từ '谁 (shéi)' có nghĩa là gì?", options: ["Cái gì", "Ở đâu", "Ai", "Khi nào"], answer: 2 },
        { q: "Đâu là từ dùng để chỉ 'Tiếng Trung Quốc'?", options: ["英语 (Yīngyǔ)", "法语 (Fǎyǔ)", "汉语 (Hànyǔ)", "俄语 (Éyǔ)"], answer: 2 },
        { q: "Pinyin của từ '同学' (Bạn cùng lớp) là gì?", options: ["tóngxué", "péngyou", "lǎoshī", "xuésheng"], answer: 0 },
        { q: "Điền từ: 她是___的汉语老师。 (Cô ấy là giáo viên tiếng Trung của tôi)", options: ["你 (nǐ)", "他 (tā)", "我 (wǒ)", "哪 (nǎ)"], answer: 2 },
        { q: "Trợ từ nào được dùng ở cuối câu nghi vấn (Ví dụ: Còn bạn thì sao)?", options: ["的 (de)", "吗 (ma)", "呢 (ne)", "不 (bù)"], answer: 2 },
        { q: "Từ '朋友 (péngyou)' có nghĩa là gì?", options: ["Học sinh", "Bạn bè", "Giáo viên", "Bác sĩ"], answer: 1 },
        { q: "Pinyin của từ '国' (Quốc gia) là gì?", options: ["guǒ", "guó", "gūo", "guò"], answer: 1 },
        { q: "Dịch câu: 'Cô ấy là ai?'", options: ["他是谁？(Tā shì shéi?)", "她是谁？(Tā shì shéi?)", "谁是她？(Shéi shì tā?)", "她是哪？(Tā shì nǎ?)"], answer: 1 },
        { q: "Điền từ: 你是___国人？ (Bạn là người nước nào?)", options: ["那 (nà)", "哪 (nǎ)", "谁 (shéi)", "的 (de)"], answer: 1 },
        { q: "Dịch câu: 'Tôi là người Mỹ.'", options: ["我是中国人。(Wǒ shì Zhōngguó rén.)", "我是国人。(Wǒ shì guó rén.)", "我是美国人。(Wǒ shì Měiguó rén.)", "他是我朋友。(Tā shì wǒ péngyou.)"], answer: 2 },
        { q: "Đại từ '他 (tā)' dùng để chỉ ai?", options: ["Cô ấy", "Bọn họ", "Anh ấy/Ông ấy", "Bạn"], answer: 2 },
        { q: "Chọn câu đúng: 她___李月。(Cô ấy tên là Lý Nguyệt)", options: ["叫 (jiào)", "是 (shì)", "的 (de)", "好 (hǎo)"], answer: 0 },
        { q: "Trợ từ '的 (de)' thường được dùng để biểu thị quan hệ gì?", options: ["Phủ định", "Nghi vấn", "Sở hữu", "Cảm thán"], answer: 2 },
        { q: "Điền từ vào đoạn hội thoại: A: 她呢？她是 你 同学 吗？ B: 她 ___ 是我同学，她是我朋友。", options: ["不 (bù)", "没 (méi)", "的 (de)", "很 (hěn)"], answer: 0 },
        { q: "Dịch câu: 'Anh ấy là bạn cùng lớp của tôi.'", options: ["她是我同学。(Tā shì wǒ tóngxué.)", "他是我的老师。(Tā shì wǒ de lǎoshī.)", "他是我同学。(Tā shì wǒ tóngxué.)", "他不是我同学。(Tā bú shì wǒ tóngxué.)"], answer: 2 },
        { q: "Pinyin của từ '哪' (Nào/Cái nào) là gì?", options: ["nà", "nǎ", "ne", "nǐ"], answer: 1 },
        { q: "Chọn đáp án đúng ứng với: Tā shì shéi?", options: ["他是谁？", "你是谁？", "我是谁？", "她去哪？"], answer: 0 },
        { q: "Nếu ai đó hỏi '你呢？(Nǐ ne?)', họ đang muốn nói gì?", options: ["Bạn tên gì?", "Bạn đi đâu?", "Còn bạn thì sao?", "Bạn khỏe không?"], answer: 2 },
        { q: "Từ vựng nào KHÔNG xuất hiện trong Bài 4 HSK1?", options: ["汉语 (Hànyǔ)", "吃 (Chī)", "图书馆 (Túshūguǎn)", "照片 (Zhàopiàn)"], answer: 1 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('feedback').innerHTML = '';
        
        const q = questions[currentQuestionIndex];
        document.getElementById('question-count').innerText = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        // Cập nhật thanh tiến trình
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';

        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = '';

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsGrid.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (answered) return;
        answered = true;
        
        const q = questions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');

        if (selectedIndex === q.answer) {
            btnElement.classList.add('correct');
            feedback.innerHTML = '✨ Chính xác!';
            feedback.className = 'feedback success';
            score++;
            playSound('correct');
        } else {
            btnElement.classList.add('wrong');
            buttons[q.answer].classList.add('correct');
            feedback.innerHTML = '❌ Sai rồi! Đáp án đúng màu xanh lá.';
            feedback.className = 'feedback error';
            playSound('incorrect');
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Bạn đúng ${score}/${questions.length} câu`;
        
        let msg = "";
        if(score === 20) msg = "Quá tuyệt vời! Bạn đã thuộc làu bài 4 rồi! 🌸";
        else if(score >= 15) msg = "Rất tốt! Chỉ một chút nữa là hoàn hảo. 🌿";
        else msg = "Hãy ôn tập thêm các bài khóa và thử lại nhé! 🌱";
        
        document.getElementById('result-message').innerText = msg;
    }
</script>

</body>
</html>
