<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Game Của Tôi - Ghibli Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); /* Hình nền rừng cây nhẹ nhàng */
            background-size: cover;
            background-attachment: fixed;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.7);
            width: 100%;
            margin-bottom: 30px;
            border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
        }

        h1 {
            margin: 0;
            color: var(--ghibli-dark-green);
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p.subtitle {
            font-style: italic;
            color: #555;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 90%;
            padding-bottom: 50px;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--ghibli-leaf);
            box-shadow: 0 15px 30px rgba(79, 121, 66, 0.2);
        }

        .game-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .game-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--ghibli-wood);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--ghibli-dark-green);
        }

        /* Trang trí thêm hình lá */
        .leaf {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
    <h1>Khu Vườn Tiếng Trung 🌿</h1>
    <p class="subtitle">Nơi lưu giữ các trò chơi học tập được tạo bởi Gemini</p>
</header>

<div class="container">
    <a href="BO THU 1.html" class="game-card">
        <div class="game-icon">🌱</div>
        <div class="game-title">BỘ THỦ 1</div>
    </a>

    <a href="BO THU 2.html" class="game-card">
        <div class="game-icon">🌿</div>
        <div class="game-title">BỘ THỦ 2</div>
    </a>

    <a href="BO THU 3.html" class="game-card">
        <div class="game-icon">☘️</div>
        <div class="game-title">BỘ THỦ 3</div>
    </a>

    <a href="BO THU 4.html" class="game-card">
        <div class="game-icon">🍀</div>
        <div class="game-title">BỘ THỦ 4</div>
    </a>

    <a href="BO THU 5.html" class="game-card">
        <div class="game-icon">🍃</div>
        <div class="game-title">BỘ THỦ 5</div>
    </a>

    <a href="BO THU 6.html" class="game-card">
        <div class="game-icon">🌳</div>
        <div class="game-title">BỘ THỦ 6</div>
    </a>

    <a href="HSK1-LESSON1-2.html" class="game-card">
        <div class="game-icon">📚</div>
        <div class="game-title">HSK1: Bài 1-2</div>
    </a>

    <a href="HSK1-LESSON3.html" class="game-card">
        <div class="game-icon">📖</div>
        <div class="game-title">HSK1: Bài 3</div>
    </a>

</div>

<footer>
    © 2024 - Made with ❤️ and Gemini - Studio Ghibli Theme
</footer>

</body>
</html>
