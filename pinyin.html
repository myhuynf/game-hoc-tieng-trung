<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cùng Nga Học Pinyin chuẩn HSK 👩‍🏫🌿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ghibli-green: #9dc183; 
            --ghibli-dark: #4f7942; 
            --accent-pink: #ffb7c5; 
            --highlight: #ffd166; 
            --paper: #fdfcf0; 
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--paper); 
            margin: 0; 
            padding: 0; 
            color: #444; 
            overflow: hidden; /* Ngăn cuộn toàn trang để dùng cuộn trong bảng */
        }

        /* Header & Nút Quay Lại */
        .header-nav {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn { 
            text-decoration: none; 
            color: white; 
            background: var(--ghibli-green); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            box-shadow: 0 3px 0 var(--ghibli-dark); 
            font-size: 0.85rem;
            white-space: nowrap;
        }

        h1 { 
            flex-grow: 1;
            text-align: center; 
            color: var(--ghibli-dark); 
            font-size: 1.1rem; 
            margin: 0;
        }

        /* Container Bảng Tối Ưu */
        .table-container { 
            width: 100vw; 
            height: calc(100vh - 60px); 
            overflow: auto; 
            background: white;
            position: relative;
        }

        table { 
            border-collapse: separate; 
            border-spacing: 0; 
            min-width: 100%;
        }

        /* Tiêu đề dính (Sticky) */
        thead th { 
            position: sticky; 
            top: 0; 
            z-index: 20; 
            color: white; 
            padding: 12px 5px; 
            font-size: 1rem; 
            border-bottom: 2px solid var(--ghibli-dark);
        }

        .final-header { 
            position: sticky; 
            left: 0; 
            z-index: 21; 
            background: #f8fbf8 !important; 
            color: var(--ghibli-dark); 
            font-weight: bold; 
            padding: 12px 10px; 
            border-right: 2px solid var(--ghibli-green);
            text-align: center;
        }

        /* Nhóm màu sắc Pinyin */
        .group-labial { background: #ffcad4 !important; }
        .group-alveolar { background: #ffe5d9 !important; }
        .group-velar { background: #ffecb3 !important; }
        .group-palatal { background: #e2cfea !important; }
        .group-retroflex { background: #d1e7dd !important; }
        .group-sibilant { background: #d0f4de !important; }
        .group-zero { background: var(--ghibli-green) !important; }

        td { 
            padding: 15px 5px; 
            text-align: center; 
            border-bottom: 1px solid #eee; 
            font-size: 1.1rem; 
            min-width: 50px;
        }

        .syllable { 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 8px; 
            transition: all 0.2s;
            display: block;
        }

        .syllable:active, .syllable.active { 
            background: var(--accent-pink) !important; 
            color: white; 
            transform: scale(1.1);
        }

        .empty { color: #eee; pointer-events: none; }

        /* Menu chọn thanh điệu (Tone Menu) */
        #toneMenu { 
            display: none; 
            position: fixed; 
            background: white; 
            border: 3px solid var(--ghibli-green); 
            border-radius: 20px; 
            padding: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            z-index: 1000;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%); /* Căn giữa màn hình trên mobile */
        }

        .tone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .t-btn { 
            border: none; 
            background: #f0f7ef; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: var(--ghibli-dark); 
            box-shadow: 0 4px 0 #d4e4d0;
        }

        .t-btn.playing { 
            background: var(--highlight) !important; 
            box-shadow: none; 
            transform: translateY(3px); 
        }

        #errorLog { display: none; color: #e63946; font-size: 0.8rem; margin-top: 10px; text-align: center; }

        /* Responsive cho Desktop */
        @media (min-width: 768px) {
            #toneMenu { 
                position: absolute; 
                transform: none; 
                left: auto; 
                top: auto; 
            }
            .tone-grid { display: flex; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="index.html" class="back-btn">🍃 VỀ VƯỜN</a>
        <h1>Học Pinyin cùng Nga Học HSK ✨</h1>
    </div>

    <div class="table-container">
        <table id="pinyinMainTable">
            <thead>
                <tr id="initialHeaders">
                    <th class="final-header" style="background: var(--ghibli-green) !important; color: white;">V\T</th>
                </tr>
            </thead>
            <tbody id="pinyinBody"></tbody>
        </table>
    </div>

    <div id="toneMenu">
        <div id="toneLabel" style="text-align:center; font-weight:bold; margin-bottom:15px; font-size:1.4rem; color: var(--ghibli-dark);"></div>
        <div class="tone-grid">
            <button class="t-btn" onclick="playWithRetry(1)" id="btn-t1">1</button>
            <button class="t-btn" onclick="playWithRetry(2)" id="btn-t2">2</button>
            <button class="t-btn" onclick="playWithRetry(3)" id="btn-t3">3</button>
            <button class="t-btn" onclick="playWithRetry(4)" id="btn-t4">4</button>
        </div>
        <div id="errorLog">⚠️ Thiếu file: <span id="missingFileName"></span></div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const initials = ['', 'b', 'p', 'm', 'f', 'd', 't', 'n', 'l', 'g', 'k', 'h', 'j', 'q', 'x', 'zh', 'ch', 'sh', 'r', 'z', 'c', 's'];
        const finals = ['a', 'o', 'e', 'ai', 'ei', 'ao', 'ou', 'an', 'en', 'ang', 'eng', 'er', 'i', 'ia', 'iao', 'ie', 'iu', 'ian', 'in', 'iang', 'ing', 'iong', 'u', 'ua', 'uo', 'uai', 'ui', 'uan', 'un', 'uang', 'ueng', 'ü', 'üe', 'üan', 'ün'];
        const groupMap = {'': 'group-zero', 'b':'group-labial','p':'group-labial','m':'group-labial','f':'group-labial', 'd':'group-alveolar','t':'group-alveolar','n':'group-alveolar','l':'group-alveolar', 'g':'group-velar','k':'group-velar','h':'group-velar', 'j':'group-palatal','q':'group-palatal','x':'group-palatal', 'zh':'group-retroflex','ch':'group-retroflex','sh':'group-retroflex','r':'group-retroflex', 'z':'group-sibilant','c':'group-sibilant','s':'group-sibilant'};
        const validData = new Set(['a','o','e','ai','ei','ao','ou','an','en','ang','eng','er','ba','bo','bai','bei','bao','ban','ben','bang','beng','bi','biao','bie','bian','bin','bing','pa','po','pai','pei','pao','pou','pan','pen','pang','peng','pi','piao','pie','pian','pin','ping','ma','mo','me','mai','mei','mao','mou','man','men','mang','meng','mi','miao','mie','miu','mian','min','ming','fa','fo','fei','fou','fan','fen','fang','feng','da','de','dai','dei','dao','dou','dan','den','dang','deng','dong','di','diao','die','diu','dian','ding','du','duo','dui','duan','dun','ta','te','tai','tao','tou','tan','tang','teng','tong','ti','tiao','tie','tian','ting','tu','tuo','tui','tuan','tun','na','ne','nai','nei','nao','nou','nan','nen','nang','neng','nong','ni','niao','nie','niu','nian','nin','niang','ning','nu','nuo','nuan','nü','nüe','la','le','lai','lei','lao','lou','lan','lang','leng','long','li','lia','liao','lie','liu','lian','lin','liang','ling','lu','luo','luan','lun','lü','lüe','ga','ge','gai','gei','gao','gou','gan','gen','gang','geng','gong','gu','gua','guo','guai','gui','guan','gun','guang','ka','ke','kai','kei','kao','kou','kan','ken','kang','keng','kong','ku','kua','kuo','kuai','kui','kuan','kun','kuang','ha','he','hai','hei','hao','hou','han','hen','hang','heng','hong','hu','hua','huo','huai','hui','huan','hun','huang','zha','zhe','zhi','zhai','zhei','zhao','zhou','zhan','zhen','zhang','zheng','zhong','zhu','zhua','zhuo','zhuai','zhui','zhuan','zhun','zhuang','cha','che','chi','chai','chao','chou','chan','chen','chang','cheng','chong','chu','chua','chuo','chuai','chui','chuan','chun','chuang','sha','she','shi','shai','shei','shao','shou','shan','shen','shang','sheng','shu','shua','shuo','shuai','shui','shuan','shun','shuang','re','ri','rao','rou','ran','ren','rang','reng','rong','ru','ruo','rui','ruan','run','za','ze','zi','zai','zei','zao','zou','zan','zen','zang','zeng','zong','zu','zuo','zui','zuan','zun','ca','ce','ci','cai','cao','cou','can','cen','cang','ceng','cong','cu','cuo','cui','cuan','cun','sa','se','si','sai','sao','sou','san','sen','sang','seng','song','su','suo','sui','suan','sun','ji','jia','jiao','jie','jiu','jian','jin','jiang','jing','jiong','ju','jue','juan','jun','qi','qia','qiao','qie','qiu','qian','qin','qiang','qing','qiong','qu','que','quan','qun','xi','xia','xiao','xie','xiu','xian','xin','xiang','xing','xiong','xu','xue','xuan','xun','yi','ya','yao','ye','you','yan','yin','yang','ying','yong','wu','wa','wo','wai','wei','wan','wen','wang','weng','yu','yuan','yue','yun']);

        function getToneMarked(s, t) {
            const m = {'a':['ā','á','ǎ','à'],'e':['ē','é','ě','è'],'o':['ō','ó','ǒ','ò'],'i':['ī','í','ǐ','ì'],'u':['ū','ú','ǔ','ù'],'ü':['ǖ','ǘ','ǚ','ǜ']};
            let r = s;
            if (r.includes('a')) r=r.replace('a', m['a'][t-1]);
            else if (r.includes('e')) r=r.replace('e', m['e'][t-1]);
            else if (r.includes('o')) r=r.replace('o', m['o'][t-1]);
            else if (r.includes('iu')) r=r.replace('u', m['u'][t-1]);
            else if (r.includes('ui')) r=r.replace('i', m['i'][t-1]);
            else if (r.includes('i')) r=r.replace('i', m['i'][t-1]);
            else if (r.includes('u')) r=r.replace('u', m['u'][t-1]);
            else if (r.includes('ü')) r=r.replace('ü', m['ü'][t-1]);
            return r;
        }

        let curS = "", activeC = null;
        const menu = document.getElementById('toneMenu'), player = document.getElementById('audioPlayer');

        function init() {
            const h = document.getElementById('initialHeaders'), b = document.getElementById('pinyinBody');
            initials.forEach(i => { const th = document.createElement('th'); th.className = groupMap[i] || ''; th.innerText = i===''?'Ø':i; h.appendChild(th); });
            finals.forEach(f => {
                const tr = document.createElement('tr'); const th = document.createElement('th'); th.className = 'final-header'; th.innerText = f; tr.appendChild(th);
                initials.forEach(i => {
                    const td = document.createElement('td');
                    let s = (i==='' && ['i','u','ü'].some(v=>f.startsWith(v))) ? getZ(f) : (['j','q','x'].includes(i) && f.startsWith('ü')) ? i+f.replace('ü','u') : i+f;
                    if (validData.has(s)) { 
                        td.className = 'syllable'; 
                        td.innerText = s; 
                        td.onclick = (e) => openMenu(e, s, td); 
                    } else { 
                        td.className = 'empty'; 
                        td.innerText = '·'; 
                    }
                    tr.appendChild(td);
                });
                b.appendChild(tr);
            });
        }

        function getZ(f) { const m = {'i':'yi','ia':'ya','iao':'yao','ie':'ye','iu':'you','ian':'yan','in':'yin','iang':'yang','ing':'ying','iong':'yong','u':'wu','ua':'wa','uo':'wo','uai':'wai','ui':'wei','uan':'wan','un':'wen','uang':'wang','ueng':'weng','ü':'yu','üe':'yue','üan':'yuan','ün':'yun'}; return m[f] || f; }

        function openMenu(e, s, c) {
            curS = s; 
            document.getElementById('toneLabel').innerText = s; 
            document.getElementById('errorLog').style.display='none';
            for(let t=1; t<=4; t++) document.getElementById(`btn-t${t}`).innerText = getToneMarked(s, t);
            
            menu.style.display = 'block'; 
            if (activeC) activeC.classList.remove('active');
            activeC = c; 
            activeC.classList.add('active');

            // Định vị menu thông minh cho desktop
            if (window.innerWidth >= 768) {
                let x = e.clientX, y = e.clientY;
                if (x + 250 > window.innerWidth) x -= 250;
                if (y + 180 > window.innerHeight) y -= 180;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
            }
            e.stopPropagation();
        }

        function playWithRetry(t) {
            const btn = document.getElementById(`btn-t${t}`); 
            btn.classList.add('playing');
            let names = []; 
            let b = curS;
            
            // Chuẩn hóa tên file để khớp GitHub
            if (['ju','qu','xu','jue','que','xue','juan','quan','xuan','jun','qun','xun'].includes(b)) { 
                names.push(b.replace('u','v')+t); 
                names.push(b+t); 
            } else if (['zhi','chi','shi','ri','zi','ci','si'].includes(b)) { 
                names.push(b+t); 
                names.push(b.slice(0,-1)+t); 
            } else { 
                names.push(b.replace('ü','v')+t); 
                names.push(b+t); 
            }

            let att = 0;
            function tryP() {
                if (att >= names.length) { 
                    btn.classList.remove('playing'); 
                    document.getElementById('missingFileName').innerText = names[0]+".mp3"; 
                    document.getElementById('errorLog').style.display='block'; 
                    return; 
                }
                player.src = `audio/${names[att]}.mp3`;
                player.play().then(() => { 
                    player.onended = () => btn.classList.remove('playing'); 
                }).catch(() => { 
                    att++; 
                    tryP(); 
                });
            }
            tryP();
        }

        document.addEventListener('click', (e) => { 
            if (!menu.contains(e.target)) { 
                menu.style.display = 'none'; 
                if (activeC) activeC.classList.remove('active'); 
            } 
        });
        
        init();
    </script>
</body>
</html>
