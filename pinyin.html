<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Pinyin - Khu Vườn Tiếng Trung</title>
    <style>
        /* Phong cách Ghibli với tông xanh hồng */
        body {
            background-color: #fdf5f7; /* Hồng nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #ff85a2; /* Hồng đậm Ghibli */
            text-shadow: 2px 2px #fff;
        }

        .pinyin-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #bce29e; /* Xanh lá nhạt */
        }

        .pinyin-card {
            background: #fff;
            border: 2px solid #ffc2d1;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .pinyin-card:hover {
            transform: scale(1.05);
            background: #f0fff0; /* Đổi sang xanh khi hover */
        }

        .tone-btn {
            display: inline-block;
            margin: 2px;
            padding: 5px 8px;
            background: #ff85a2;
            color: white;
            border-radius: 5px;
            font-size: 0.8em;
            text-decoration: none;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Khu Vườn Tiếng Trung - Bảng Phát Âm</h1>
    <p>Nhấp vào các thanh điệu để nghe âm thanh từ thư mục GitHub của bạn.</p>

    <div class="pinyin-container" id="pinyinBoard">
        </div>

    <div class="footer">
        Giáo viên: Nga Học HSK | Hệ thống tự động kết nối thư mục /audio/
    </div>

    <script>
        // Danh sách các âm giáo viên đang tập trung
        const pinyins = ['ta', 'za', 'ca', 'sa', 'zha', 'sha', 'ra'];
        const tones = [1, 2, 3, 4];
        const board = document.getElementById('pinyinBoard');

        // Hàm tạo bảng
        pinyins.forEach(py => {
            const card = document.createElement('div');
            card.className = 'pinyin-card';
            card.innerHTML = `<strong>${py.toUpperCase()}</strong><br>`;
            
            tones.forEach(t => {
                const btn = document.createElement('span');
                btn.className = 'tone-btn';
                btn.innerText = 'Thanh ' + t;
                btn.onclick = () => playPinyin(py, t);
                card.appendChild(btn);
            });
            
            board.appendChild(card);
        });

        // Hàm phát nhạc - Tận dụng thư mục audio trên GitHub của giáo viên
        function playPinyin(py, tone) {
            const fileName = py + tone + ".mp3"; // Kết quả: ta1.mp3
            const audioPath = "audio/" + fileName; // Trỏ vào thư mục audio giáo viên đã có

            const audio = new Audio(audioPath);
            
            audio.play().catch(err => {
                console.error("Lỗi:", err);
                alert("Không tìm thấy file " + fileName + " trong thư mục audio trên GitHub của bạn!");
            });
        }
    </script>
</body>
</html>
