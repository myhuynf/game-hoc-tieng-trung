<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 15: Tôi đi bằng máy bay - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-pink: #ffb7c5;
            --white: #ffffff;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --info-color: #1976d2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin: 0; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        .home-btn {
            background: var(--ghibli-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .home-btn:hover { background: var(--ghibli-dark-green); transform: scale(1.05); }

        .game-wrapper {
            width: 95%;
            max-width: 700px;
            margin: 20px;
            text-align: center;
        }

        #main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-btn {
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--ghibli-green);
            background: #f0f9f0;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .menu-btn:hover { transform: translateY(-5px); background: var(--ghibli-green); color: white; }

        .game-container {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--ghibli-wood);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: var(--ghibli-pink);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flashcard-container { perspective: 1000px; width: 100%; height: 300px; margin-bottom: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 25px; border: 2px solid var(--ghibli-green); background: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f0f9f0; }
        .flashcard .cn { font-size: 5rem; color: var(--ghibli-dark-green); }
        .flashcard .pinyin { font-size: 1.5rem; color: #666; font-weight: 600; margin-top: 10px; }
        .flashcard .vi { font-size: 1.8rem; color: var(--ghibli-wood); font-weight: 700; margin-top: 5px; }
        .flashcard .example { font-size: 1rem; color: #555; font-style: italic; margin-top: 10px; max-width: 90%; }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--ghibli-green); color: white; box-shadow: 0 4px 0 var(--ghibli-dark-green); }
        .btn-secondary { background: #eee; color: #666; }
        .btn-success { background: var(--success-color); color: white; flex: 1; }
        .btn-error { background: var(--error-color); color: white; flex: 1; }
        
        .memory-controls { width: 100%; display: flex; gap: 15px; margin-bottom: 10px; }

        .summary-title { color: var(--ghibli-dark-green); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { padding: 15px; border-radius: 15px; background: #f9f9f9; border: 2px solid #eee; }
        .stat-item.green { border-color: var(--success-color); color: var(--success-color); }
        .stat-item.red { border-color: var(--error-color); color: var(--error-color); }
        .stat-val { font-size: 1.8rem; font-weight: bold; }
        
        .review-list { text-align: left; background: #fffaf0; border-radius: 20px; padding: 20px; border: 1px solid #ffe4b5; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .review-cn { font-weight: bold; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        .question-box { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 2px dashed var(--ghibli-green); margin-bottom: 25px; }
        .question-text { font-size: 1.4rem; color: var(--ghibli-dark-green); font-weight: 600; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .option-card { padding: 15px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; background: white; font-weight: 600; }
        .option-card.selected { background: var(--ghibli-green); color: white; border-color: var(--ghibli-green); }
        .answer-zone { min-height: 70px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; padding: 15px; justify-content: center; align-items: center; background: #fafafa; }
        .word-tag { background: var(--ghibli-green); color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; }
        .feedback { padding: 15px; border-radius: 15px; margin-top: 15px; display: none; font-weight: 600; }
        .success { background: #e8f5e9; color: var(--success-color); border: 2px solid var(--success-color); }
        .error { background: #ffebee; color: var(--error-color); border: 2px solid var(--error-color); }
        .explanation-box { margin-top: 15px; padding: 15px; background: #e3f2fd; border-left: 5px solid var(--info-color); border-radius: 10px; text-align: left; display: none; }
    </style>
</head>
<body>

<header class="header">
    <h1>Khu Vườn Bài 15 ✈️</h1>
    <a href="index.html" class="home-btn">🏡 Về vườn</a>
</header>

<div class="game-wrapper">
    <div id="main-menu">
        <h2 style="color: var(--ghibli-dark-green); margin-bottom: 10px;">Chào bạn! Hôm nay bạn muốn luyện tập gì?</h2>
        <button class="menu-btn" onclick="startVocabulary()">
            <div class="icon" style="font-size: 2.5rem;">✈️</div>
            <div class="text">
                <h3>Ôn tập Từ vựng</h3>
                <p>Nhận diện phương tiện, địa điểm và thời gian trong Bài 15.</p>
            </div>
        </button>
        <button class="menu-btn" onclick="startGrammar()">
            <div class="icon" style="font-size: 2.5rem;">📝</div>
            <div class="text">
                <h3>Thách thức Ngữ pháp</h3>
                <p>Cấu trúc 是...的, cách dùng phương tiện và thời gian.</p>
            </div>
        </button>
    </div>

    <div id="vocab-game" class="game-container">
        <div class="stats">
            <span>Bài 15: Từ vựng</span>
            <span><span id="vocab-current">1</span>/14</span>
        </div>
        <div class="progress-bar"><div id="vocab-progress" class="progress-inner"></div></div>
        
        <div class="flashcard-container" onclick="flipCard()">
            <div id="flashcard" class="flashcard">
                <div class="flashcard-face">
                    <div id="vocab-cn" class="cn">飞机</div>
                    <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">(Chạm để lật thẻ)</p>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div id="vocab-pinyin" class="pinyin">fēijī</div>
                    <div id="vocab-vi" class="vi">máy bay</div>
                    <div id="vocab-ex" class="example">"我们坐飞机去。"</div>
                </div>
            </div>
        </div>

        <div class="memory-controls">
            <button class="btn btn-error" onclick="markMemory(false)">Chưa nhớ ❌</button>
            <button class="btn btn-success" onclick="markMemory(true)">Đã nhớ ✅</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="prevVocab()">◀ Quay lại</button>
            <button class="btn btn-primary" onclick="nextVocab()">Bỏ qua ▶</button>
        </div>
    </div>

    <div id="vocab-result" class="game-container">
        <h2 class="summary-title">Kết quả ôn tập 🌿</h2>
        <div class="stats-grid">
            <div class="stat-item green">
                <div>Đã thuộc</div>
                <div id="res-percent-known" class="stat-val">0%</div>
                <div id="res-count-known" style="font-size: 0.9rem;">0 từ</div>
            </div>
            <div class="stat-item red">
                <div>Chưa thuộc</div>
                <div id="res-percent-unknown" class="stat-val">0%</div>
                <div id="res-count-unknown" style="font-size: 0.9rem;">0 từ</div>
            </div>
        </div>
        <div id="review-section">
            <p style="text-align: left; font-weight: 600; color: var(--ghibli-wood);">Danh sách cần ôn lại:</p>
            <div id="review-list" class="review-list"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="startVocabulary()">Ôn tập lại</button>
            <button class="btn btn-primary" onclick="location.reload()">Về thực đơn</button>
        </div>
    </div>

    <div id="grammar-game" class="game-container">
        <div class="stats">
            <span>Câu hỏi: <span id="grammar-current">1</span>/10</span>
            <span class="score-display">Điểm: <span id="score-val">0</span></span>
        </div>
        <div class="progress-bar"><div id="grammar-progress" class="progress-inner"></div></div>
        <div id="grammar-content">
            <div id="q-box" class="question-box"><div id="q-text" class="question-text"></div></div>
            <div id="ans-zone" class="answer-zone"></div>
            <div id="opt-grid" class="options-grid"></div>
            <div id="grammar-feedback" class="feedback"></div>
            <div
