<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Bài 2 - Khu Vườn Của Nga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ghibli-green: #a8d5ba; --ghibli-brown: #d4a373; --ghibli-sky: #caf0f8; --ghibli-wood: #6d4c41; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .ghibli-card { background: rgba(255, 255, 255, 0.95); border: 4px solid var(--ghibli-wood); border-radius: 20px; box-shadow: 0 10px 0 var(--ghibli-brown); }
        .btn-ghibli { background-color: var(--ghibli-green); color: var(--ghibli-wood); border: 2px solid var(--ghibli-wood); border-radius: 12px; font-weight: bold; transition: all 0.2s; cursor: pointer; }
        .btn-ghibli:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 0 var(--ghibli-brown); }
        .btn-ghibli:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }
        .flashcard-inner { position: relative; width: 100%; height: 380px; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; padding: 20px; border: 2px solid var(--ghibli-wood); }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-container" class="w-full max-w-xl px-4 mt-10 mb-10">
        <div id="start-screen" class="ghibli-card p-8 text-center">
            <h1 class="text-3xl font-bold text-amber-900 mb-2">HSK3 - Bài 2</h1>
            <h2 class="text-xl text-emerald-700 font-bold mb-6">他什么时候回来？</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards()" class="btn-ghibli p-4">🎴 Phần 1: Ôn Flashcards</button>
                <button onclick="startVocabGame()" class="btn-ghibli p-4 relative">🎮 Phần 2: Game Từ Vựng <span id="check-vocab" class="hidden text-emerald-600 ml-2">✅</span></button>
                <button onclick="startQuiz('p3')" class="btn-ghibli p-4 relative">✨ Phần 3: Bổ ngữ phương hướng <span id="check-p3" class="hidden text-emerald-600 ml-2">✅</span></button>
                <button onclick="startQuiz('p4')" class="btn-ghibli p-4 relative">❄️ Phần 4: Hành động liên tiếp <span id="check-p4" class="hidden text-emerald-600 ml-2">✅</span></button>
                <button onclick="startQuiz('p5')" class="btn-ghibli p-4 relative">🔗 Phần 5: Câu hỏi phản vấn <span id="check-p5" class="hidden text-emerald-600 ml-2">✅</span></button>
                <button id="btn-comprehensive" onclick="showExercise()" class="btn-ghibli p-4 mt-4" disabled>🔒 Bài Tập Tổng Hợp (Cần xong game)</button>
            </div>
        </div>

        <div id="flashcard-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between mb-4"><button onclick="returnToStart()" class="text-amber-700 font-bold">🔙 Quay lại</button><div class="font-bold">Thẻ: <span id="card-index">1</span>/18</div></div>
            <div id="flashcard-inner" class="flashcard-inner" onclick="flipCard()"><div class="flashcard-front bg-white"><h2 id="card-hanzi" class="chinese-text text-8xl text-amber-900"></h2><p class="mt-4 text-amber-600 animate-pulse">Chạm để lật 👆</p></div><div class="flashcard-back text-center"><h3 id="card-pinyin" class="text-3xl font-bold text-emerald-700"></h3><p id="card-mean" class="text-xl text-amber-900 mb-4 font-bold"></p><p id="card-ex-hz" class="chinese-text text-xl text-amber-800"></p><p id="card-ex-vi" class="text-sm text-gray-600 mt-2"></p></div></div>
            <button onclick="nextCard()" class="btn-ghibli w-full p-4 mt-6">Tiếp theo</button>
        </div>

        <div id="vocab-game-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between mb-4"><button onclick="returnToStart()" class="text-amber-700 font-bold">🔙</button><div id="vg-step-text" class="font-bold"></div></div>
            <div id="vg-content" class="min-h-[150px] flex flex-col items-center justify-center"></div>
            <div id="vg-feedback" class="mt-4 p-3 rounded-lg hidden text-center font-bold"></div>
            <div class="mt-6 flex gap-2"><button id="vg-check-btn" onclick="checkVocabGame()" class="btn-ghibli flex-1 p-4 bg-amber-500 text-white">Kiểm tra</button><button id="vg-next-btn" onclick="nextVocabStep()" class="btn-ghibli flex-1 p-4 hidden">Tiếp theo</button></div>
        </div>

        <div id="play-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between mb-4"><button onclick="returnToStart()" class="text-amber-700 font-bold">🔙</button><div id="quiz-part-name" class="font-bold uppercase"></div></div>
            <div id="question-box" class="min-h-[100px] flex items-center justify-center p-4 bg-white rounded-xl mb-6"><p id="question-text" class="chinese-text text-2xl text-center"></p></div>
            <div id="options-container" class="grid gap-3"></div>
            <div id="explanation-container" class="mt-4 p-4 bg-amber-50 border-l-4 border-amber-500 hidden">
                <p id="exp-full" class="chinese-text text-lg mb-2"></p>
                <p id="exp-vi" class="text-sm italic mb-2"></p>
                <button onclick="showNextQuestion()" class="btn-ghibli w-full p-2">Tiếp tục</button>
            </div>
        </div>

        <div id="end-screen" class="ghibli-card p-8 text-center hidden"><h2 class="text-2xl font-bold mb-4">Kết quả</h2><p id="result-text" class="mb-6"></p><button onclick="returnToStart()" class="btn-ghibli w-full p-4">Quay về Menu</button></div>

        <div id="exercise-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between mb-4"><h2 class="font-bold">Bài Tập Tổng Hợp</h2><button onclick="returnToStart()" class="text-red-500">Đóng</button></div>
            <div id="exercise-content" class="max-h-[50vh] overflow-y-auto chinese-text"></div>
            <button onclick="checkFinalExercise()" class="btn-ghibli w-full p-4 mt-4 bg-emerald-600 text-white">Nộp bài & Copy</button>
            <div id="exercise-feedback" class="mt-2 hidden p-2 bg-green-100 text-green-700 text-sm text-center"></div>
        </div>
    </div>

    <script>
        let gameState = { vocabDone: false, p3Done: false, p4Done: false, p5Done: false };
        const vocabulary = [
            { hz: "腿", py: "tuǐ", vi: "Chân", exHz: "我的腿疼。", exVi: "Chân tôi bị đau." },
            { hz: "疼", py: "téng", vi: "Đau", exHz: "昨天走路太多了，现在腿很疼。", exVi: "Hôm qua đi bộ nhiều quá, giờ chân rất đau." },
            { hz: "容易", py: "róngyì", vi: "Dễ dàng", exHz: "写汉字不容易。", exVi: "Viết chữ Hán không dễ." },
            { hz: "经理", py: "jīnglǐ", vi: "Giám đốc", exHz: "经理不在，他出去了。", exVi: "Giám đốc không có ở đây." }
        ];

        const quizData = {
            p3: [{ q: "我在楼下，你___来吧。", a: "下", opt: ["上", "下", "进"], vi: "Tôi ở dưới lầu, bạn xuống đây đi.", exp: "Hướng về phía người nói ở dưới." }],
            p4: [{ q: "我到了办公室___给你打电话。", a: "就", opt: ["也", "还", "就"], vi: "Đến văn phòng là gọi điện ngay.", exp: "Hành động liên tiếp." }],
            p5: [{ q: "我每天运动，___胖吗？", a: "能", opt: ["不", "能", "会"], vi: "Tôi vận động mỗi ngày, sao béo được?", exp: "Câu phản vấn." }]
        };

        let currentIdx = 0, score = 0, currentPart = '', quizList = [];

        function showScreen(id) {
            ['start-screen', 'flashcard-screen', 'vocab-game-screen', 'play-screen', 'end-screen', 'exercise-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function returnToStart() { showScreen('start-screen'); updateLockStatus(); }

        function updateLockStatus() {
            const allDone = gameState.vocabDone && gameState.p3Done && gameState.p4Done && gameState.p5Done;
            const btn = document.getElementById('btn-comprehensive');
            if(allDone) { btn.disabled = false; btn.style.backgroundColor = '#dcfce7'; btn.innerText = "✅ Bài Tập Tổng Hợp"; }
            if(gameState.vocabDone) document.getElementById('check-vocab').classList.remove('hidden');
            if(gameState.p3Done) document.getElementById('check-p3').classList.remove('hidden');
            if(gameState.p4Done) document.getElementById('check-p4').classList.remove('hidden');
            if(gameState.p5Done) document.getElementById('check-p5').classList.remove('hidden');
        }

        // FLASHCARDS
        function startFlashcards() { currentIdx = 0; showCard(); showScreen('flashcard-screen'); }
        function showCard() {
            const c = vocabulary[currentIdx];
            document.getElementById('card-index').innerText = currentIdx + 1;
            document.getElementById('card-hanzi').innerText = c.hz;
            document.getElementById('card-pinyin').innerText = c.py;
            document.getElementById('card-mean').innerText = c.vi;
            document.getElementById('card-ex-hz').innerText = c.exHz;
            document.getElementById('card-ex-vi').innerText = c.exVi;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }
        function flipCard() { document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        function nextCard() { if(currentIdx < vocabulary.length-1) { currentIdx++; showCard(); } else returnToStart(); }

        // GAME VOCAB
        function startVocabGame() { currentIdx = 0; score = 0; showVocabStep(); showScreen('vocab-game-screen'); }
        function showVocabStep() {
            const w = vocabulary[currentIdx];
            document.getElementById('vg-step-text').innerText = `Câu ${currentIdx+1}/${vocabulary.length}`;
            document.getElementById('vg-feedback').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.add('hidden');
            document.getElementById('vg-check-btn').classList.remove('hidden');
            document.getElementById('vg-content').innerHTML = `<p class="text-3xl font-bold mb-4">${w.vi}</p><input type="text" id="vg-input" class="w-full text-center text-2xl p-2 border-b-2 border-amber-500 outline-none">`;
            setTimeout(()=>document.getElementById('vg-input').focus(), 100);
        }
        function checkVocabGame() {
            const val = document.getElementById('vg-input').value.trim();
            const correct = vocabulary[currentIdx].hz;
            const fb = document.getElementById('vg-feedback'); fb.classList.remove('hidden');
            if(val === correct) { fb.innerText = "Đúng rồi! ✨"; fb.className = "mt-4 p-2 bg-green-100 text-green-700"; score++; }
            else { fb.innerText = "Sai, đáp án: " + correct; fb.className = "mt-4 p-2 bg-red-100 text-red-700"; }
            document.getElementById('vg-check-btn').classList.add('hidden'); document.getElementById('vg-next-btn').classList.remove('hidden');
        }
        function nextVocabStep() { if(currentIdx < vocabulary.length-1) { currentIdx++; showVocabStep(); } else { gameState.vocabDone = true; finishPart("Game Từ Vựng: " + score + "/" + vocabulary.length); } }

        // QUIZ
        function startQuiz(p) { currentPart = p; currentIdx = 0; score = 0; quizList = quizData[p]; document.getElementById('quiz-part-name').innerText = p; showQuestion(); showScreen('play-screen'); }
        function showQuestion() {
            const q = quizList[currentIdx]; document.getElementById('question-text').innerText = q.q; document.getElementById('explanation-container').classList.add('hidden');
            const cont = document.getElementById('options-container'); cont.innerHTML = '';
            q.opt.forEach(o => { const b = document.createElement('button'); b.className = "btn-ghibli p-3 bg-white"; b.innerText = o; b.onclick = () => {
                if(o === q.a) score++;
                document.getElementById('exp-full').innerText = q.q.replace('___', q.a); document.getElementById('exp-vi').innerText = q.vi;
                cont.innerHTML = ''; document.getElementById('explanation-container').classList.remove('hidden');
            }; cont.appendChild(b); });
        }
        function showNextQuestion() { if(currentIdx < quizList.length-1) { currentIdx++; showQuestion(); } else { gameState[currentPart+'Done'] = true; finishPart("Xong! Điểm: " + score); } }

        function finishPart(m) { document.getElementById('result-text').innerText = m; showScreen('end-screen'); }
        
        function showExercise() {
            document.getElementById('exercise-content').innerHTML = `<p class="mb-4 text-sm">1. 经理不在，他___去了。 (出/下)</p><p class="text-sm">2. 我每天运动，能___吗？ (胖/瘦)</p>`;
            showScreen('exercise-screen');
        }
        function checkFinalExercise() { alert("Đã copy bài!"); returnToStart(); }
    </script>
</body>
</html>
