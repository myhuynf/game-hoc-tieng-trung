<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Bài 1 - Khu Vườn Của Nga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --ghibli-brown: #d4a373;
            --ghibli-sky: #caf0f8;
            --ghibli-wood: #6d4c41;
            --ghibli-dark-green: #4f7942;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .chinese-sub { font-family: 'Noto Sans SC', sans-serif; }

        .ghibli-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-wood);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--ghibli-brown);
        }

        .btn-ghibli {
            background-color: var(--ghibli-green);
            color: var(--ghibli-wood);
            border: 2px solid var(--ghibli-wood);
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
        }

        .btn-ghibli:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 var(--ghibli-brown);
            background-color: #95c7a9;
        }
        
        .btn-ghibli:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .flashcard-inner {
            position: relative;
            width: 100%; height: 380px;
            transition: transform 0.6s; transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 24px;
            border: 2px solid var(--ghibli-wood);
        }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }
        
        select.ex-select {
            appearance: none;
            -webkit-appearance: none;
            padding: 0 8px; cursor: pointer;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ghibli-brown); border-radius: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-container" class="w-full max-w-xl px-4 mt-10 mb-10">
        <div id="start-screen" class="ghibli-card p-8 text-center">
            <h1 class="text-3xl font-bold text-amber-900 mb-2">HSK3 - Bài 1</h1>
            <h2 class="text-xl text-emerald-700 font-bold mb-4 italic">周末你有什么打算？</h2>
            <div class="mx-auto mb-4 text-6xl">🌲</div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards(vocabulary)" class="btn-ghibli text-lg">🎴 Phần 1: Ôn Flashcards</button>
                <button onclick="startVocabularyGame()" class="btn-ghibli text-lg relative" style="background-color: #fef3c7;">
                    🎮 Phần 2: Game Từ Vựng <span id="check-vocab" class="absolute right-4 hidden">✅</span>
                </button>
                <button onclick="startQuiz('p3')" class="btn-ghibli text-lg relative" style="background-color: #fff1f2;">
                    ✨ Phần 3: Ngữ pháp V+好 <span id="check-p3" class="absolute right-4 hidden">✅</span>
                </button>
                <button onclick="startQuiz('p4')" class="btn-ghibli text-lg relative" style="background-color: #ecfdf5;">
                    ❄️ Phần 4: Phủ định hoàn toàn <span id="check-p4" class="absolute right-4 hidden">✅</span>
                </button>
                <button onclick="startQuiz('p5')" class="btn-ghibli text-lg relative" style="background-color: #f0f9ff;">
                    🔗 Phần 5: Liên từ 那 <span id="check-p5" class="absolute right-4 hidden">✅</span>
                </button>
                <button id="btn-comprehensive" onclick="showExercise()" class="btn-ghibli text-lg mt-2 transition-all duration-500" style="background-color: #e5e7eb; border-color: #9ca3af; color: #6b7280;" disabled>
                    🔒 Bài Tập Tổng Hợp (Cần hoàn thành Game)
                </button>
                <button onclick="window.location.href='index.html'" class="text-amber-700 font-bold text-sm mt-2 hover:underline">🏠 Trở về Khu Vườn chính</button>
            </div>
        </div>

        <div id="flashcard-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-4">
                    <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Bài 1</button>
                </div>
                <div class="text-amber-900 font-bold px-3 py-1 bg-amber-100 rounded-full text-xs">
                    Thẻ: <span id="card-index">1</span> / <span id="card-total">15</span>
                </div>
            </div>
            <div class="mb-6">
                <div id="flashcard-inner" class="flashcard-inner" onclick="flipCard()">
                    <div class="flashcard-front shadow-lg">
                        <h2 id="card-hanzi" class="chinese-text text-8xl text-amber-900 leading-tight"></h2>
                        <p class="mt-8 text-sm text-amber-600 animate-pulse font-bold">Chạm để lật thẻ 👆</p>
                    </div>
                    <div class="flashcard-back shadow-lg overflow-y-auto custom-scroll">
                        <h3 id="card-pinyin" class="text-3xl font-bold text-emerald-700 mb-1"></h3>
                        <p id="card-mean" class="text-xl text-amber-900 mb-4 font-bold border-b-2 border-amber-200 pb-2 w-center text-center"></p>
                        <div class="text-left w-full space-y-3">
                            <div><p id="card-example-cn" class="chinese-sub text-2xl text-amber-800 leading-relaxed font-medium"></p></div>
                            <p id="card-example-py" class="text-sm text-emerald-600 italic font-semibold"></p>
                            <p id="card-example-vi" class="text-sm text-gray-600 bg-white p-2 rounded-lg border border-amber-100"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="markCard(false)" class="bg-rose-100 border-2 border-rose-400 text-rose-700 p-4 rounded-xl font-bold hover:bg-rose-200">Chưa thuộc</button>
                <button onclick="markCard(true)" class="bg-emerald-100 border-2 border-emerald-400 text-emerald-700 p-4 rounded-xl font-bold hover:bg-emerald-200">Đã thuộc</button>
            </div>
        </div>
        <div id="vocab-game-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-4">
                    <button onclick="returnToStart()" class="text-amber-700 text-xs font-bold hover:underline">🔙 Bài 1</button>
                </div>
                <div class="text-emerald-800 font-bold text-sm">Game Từ Vựng: <span id="vg-step">1</span>/15</div>
            </div>
            <div id="vg-content" class="min-h-[250px] flex flex-col justify-center items-center"></div>
            <div id="vg-feedback" class="mt-4 p-3 rounded-lg hidden text-center font-bold"></div>
            <div id="vg-controls" class="mt-6 flex gap-3">
                <button id="vg-check-btn" onclick="checkVocabGame()" class="btn-ghibli flex-1 bg-amber-500 text-white border-amber-700">Kiểm tra</button>
                <button id="vg-next-btn" onclick="nextVocabStep()" class="btn-ghibli flex-1 hidden">Tiếp theo</button>
            </div>
        </div>

        <div id="play-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col gap-2">
                    <div class="flex gap-4"><button onclick="returnToStart()" class="text-amber-700 text-xs font-bold hover:underline">🔙 Bài 1</button></div>

                </div>

            </div>

            </div>
            <div id="options-container" class="grid grid-cols-1 gap-3"></div>
            <div id="explanation-container" class="bg-amber-50 border-l-4 border-amber-500 p-4 mt-4 hidden rounded overflow-y-auto custom-scroll">

                <div id="explanation-detail" class="space-y-2 mb-3">

                    <p id="exp-pinyin" class="text-emerald-700 italic text-sm font-semibold"></p>
                    <p id="exp-translation" class="text-gray-700 text-sm bg-white p-2 rounded border border-amber-100"></p>
                    <p id="explanation-text" class="text-xs text-amber-800 opacity-80"></p>
                </div>
                <button onclick="showNextQuestion()" class="bg-amber-600 text-white px-4 py-2 rounded-lg w-full font-bold shadow-md">Tiếp theo</button>
            </div>
        </div>

        <div id="exercise-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-amber-900">📝 Bài Tập Tổng Hợp</h2>
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Đóng</button>
            </div>
            <div class="overflow-y-auto max-h-[60vh] custom-scroll pr-2 text-amber-900">
                <div class="mb-8">
                    <h3 class="font-bold text-emerald-800 mb-3 bg-emerald-50 border border-emerald-200 p-2 rounded-lg">2. 选择恰当的词语填空</h3>
                    <div class="bg-amber-50 p-3 rounded mb-4 border border-amber-200 text-sm font-bold flex flex-wrap justify-center gap-2">
                        <span class="text-gray-600">Từ chọn 1:</span>
                        <span class="text-emerald-700">周末</span> | <span class="text-emerald-700">带</span> | <span class="text-emerald-700">游戏</span> | <span class="text-emerald-700">跟</span> | <span class="text-emerald-700">作业</span>
                    </div>
                    <div class="space-y-4 mb-8 chinese-text text-lg">
                        <p>1. 你写完 <select class="ex-select"><option value="">____</option><option>周末</option><option>带</option><option>游戏</option><option>跟</option><option>作业</option></select> 了吗？</p>
                        <p>2. 上个 <select class="ex-select"><option value="">____</option><option>周末</option><option>带</option><option>游戏</option><option>跟</option><option>作业</option></select> 我们去朋友家玩儿了。</p>
                        <p>3. 别玩儿 <select class="ex-select"><option value="">____</option><option>周末</option><option>带</option><option>游戏</option><option>跟</option><option>作业</option></select> 了，快去睡觉。</p>
                        <p>4. 他说好請我吃饭，但是没 <select class="ex-select"><option value="">____</option><option>周末</option><option>带</option><option>游戏</option><option>跟</option><option>作业</option></select> 钱。</p>
                        <p>5. 明天我要上课, 不能 <select class="ex-select"><option value="">____</option><option>周末</option><option>带</option><option>游戏</option><option>跟</option><option>作业</option></select> 你们一起去玩儿。</p>
                    </div>
                </div>
                </div>
            <div id="exercise-feedback" class="mt-4 p-4 rounded-xl hidden bg-emerald-50 border-2 border-emerald-500 text-emerald-900"></div>
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="checkExerciseScoreOnly()" class="btn-ghibli bg-amber-500 text-white border-amber-700">Kiểm tra điểm</button>
                <button onclick="submitExercise()" class="btn-ghibli bg-blue-500 text-white border-blue-700">Nộp bài (Copy)</button>
            </div>
        </div>

        <div id="end-screen" class="ghibli-card p-8 text-center hidden">
            <h2 class="text-3xl font-bold text-amber-900 mb-4">Hoàn thành!</h2>
            <p id="result-text" class="text-amber-800 mb-6 font-bold text-xl"></p>
            <button onclick="returnToStart()" class="btn-ghibli w-full">🔙 Quay lại Menu</button>
        </div>
    </div>

                    { q: "那个商店的东西______。", options: ["一点儿也不贵", "也不一点儿贵", "不一点儿也贵", "贵一点儿也不"], correct: 0, res: "那个商店的东西一点儿也不贵。", py: "Nàge shāngdiàn de dōngxi yìdiǎnr yě bù guì.", vi: "Đồ ở cửa hàng đó chẳng đắt chút nào.", exp: "一点儿也不 + Hình dung từ." },
                    { q: "这杯咖啡______。", options: ["一点儿都不好喝", "都不一点儿好喝", "好喝一点儿都不", "一点儿好喝都不"], correct: 0, res: "这杯咖啡一点儿都不好喝。", py: "Zhèbēi kāfēi yìdiǎnr dōu bù hǎohē.", vi: "cốc cà phê này chẳng ngon tí nào.", exp: "Phủ định hoàn toàn về tính chất." },
                    { q: "我没带钱，______。", options: ["一点儿都没买", "没买一点儿都", "一点儿买都没", "都没买一点儿"], correct: 0, res: "我一点儿都没买。", py: "Wǒ yīdiǎnr dōu méi mǎi.", vi: "Tôi chẳng mua gì cả.", exp: "一点儿 trong cấu trúc phủ định." },
                    { q: "他病了，______。", options: ["一点儿饭也不吃也", "一点儿饭也都不想吃", "不一点儿饭想吃", "一点儿饭不想也吃"], correct: 1, res: "他一点儿饭也都不想吃。", py: "Tā yìdiǎnr fàn yě dōu bù xiǎng chī.", vi: "Một chút cơm anh ấy cũng không muốn ăn.", exp: "Cấu trúc nhấn mạnh việc không muốn ăn dù một chút." },
                    { q: "我太累了，作业我______。", options: ["一点儿也不想写", "不想写一点儿也", "也一点儿不想写", "一点儿不想也写"], correct: 0, res: "我一点儿也不想写。", py: "Wǒ yìdiǎnr yě bù xiǎng xiě.", vi: "Tôi chẳng muốn viết một chút nào cả.", exp: "Nhấn mạnh mức độ không muốn thực hiện hành động." }
                ]
            },
            p5: { 
                name: "Liên Từ '那' ", 
                questions: [
                    { q: "A: 周末我不想去商店买东西。\nB: ______", options: ["那商店在学校旁边。", "那我们去公园走走吧。", "那我昨天去商店了。", "那你喜欢什么颜色？"], correct: 1, res: "那我们去公园走走吧。", py: "Nà wǒmen qù gōngyuán zǒuzou ba.", vi: "Vậy chúng ta đi công viên dạo chút đi." },
                    { q: "A: 外面下大雨了，不能去踢球了。\nB: ______", options: ["那足球很好玩。", "那我已经买球了。", "那我们在家看电影吧。", "那你喜欢运动吗？"], correct: 2, res: "那我们在家看电影吧。", py: "Nà wǒmen zàijiā kàn diànyǐng ba.", vi: "Vậy chúng ta ở nhà xem phim đi." },
                    { q: "A: 对不起，红色的手机已经卖完了。\nB: ______", options: ["那个手机很贵。", "那我买不手机。", "那红色很好看。", "那我买黑色的吧。"], correct: 3, res: "那我买黑色的吧。", py: "Nà wǒ mǎi hēisè de ba.", vi: "Vậy tôi sẽ mua cái màu đen." },
                    { q: "A: 我今天很累，不想出去吃饭。\nB: ______", options: ["那我们在家做饭吧。", "那外面的饭很好吃。", "那我明天出去吃。", "那你喜欢吃什么？"], correct: 0, res: "那我们在家做饭吧。", py: "Nà wǒmen zàijiā zuò fàn ba.", vi: "Vậy chúng ta nấu cơm ở nhà đi." },
                    { q: "A: 我不会做这个作业，太难了。\nB: ______", options: ["那这个作业很有意思。", "那我帮你看看吧。", "那个老师很好。", "那今天没有作业。"], correct: 1, res: "那我帮你看看吧。", py: "Nà wǒ bāng nǐ kànkan ba.", vi: "Vậy để mình xem giúp bạn nhé." },
                    { q: "A: 明天早上我要参加考试。\nB: ______", options: ["那我不喜欢考试。", "那今天星期三。", "那你今天早点儿休息吧。", "那考试不难。"], correct: 2, res: "那你今天早点儿休息吧。", py: "Nà nǐ jīntiān zǎodiǎnr xiūxi ba.", vi: "Vậy hôm nay bạn nghỉ ngơi sớm đi." },
                    { q: "A: 我今天出门太着急，没带钱。\nB: ______", options: ["那钱很重要。", "那我请你吃饭吧。", "那里的饭很好吃。", "那你下午去拿吧。"], correct: 1, res: "那我请你吃饭吧。", py: "Nà wǒ qǐng nǐ chīfàn ba.", vi: "Vậy để tôi mời bạn ăn cơm nhé." },
                    { q: "A: 我没带地图，不知道怎么走。\nB: ______", options: ["那地图很好看。", "你有面包吗？", "那我也找不到。", "那我们用手机吧。"], correct: 3, res: "那我们用手机吧。", py: "Nà wǒmen yòng shǒujī ba.", vi: "Vậy chúng ta dùng điện thoại đi." },
                    { q: "A: 今天张老师不在学校。\nB: ______", options: ["那我们自己复习吧。", "那老师人很好。", "那今天不是星期一。", "那我认识那个老师。"], correct: 0, res: "那我们自己复习吧。", py: "Nà wǒmen zìjǐ fùxí ba.", vi: "Vậy chúng ta tự ôn tập đi." },
                    { q: "A: 我已经吃过晚饭了，现在很饱。\nB: ______", options: ["那里的饭很好吃。", "那你会做饭吗？", "那我们去外面散步吧。", "那我喜欢吃面条。"], correct: 2, res: "那我们去散步吧。", py: "Nà wǒmen qù sànbù ba.", vi: "Vậy chúng ta đi tản bộ đi." }
                ]
            }
        };

        // --- LOGIC XỬ LÝ GAME ---
        let currentQuizKey = '', quizIdx = 0, quizScore = 0;
        let currentFlashcardIdx = 0, exerciseCorrect = 0;
        let vgIdx = 0, vgScore = 0;
        let results = { vocab: 0, p3: 0, p4: 0, p5: 0, exercise: 0 };
        let finishedPart = { v: false, p3: false, p4: false, p5: false };

        function playAudio(id) {
            const a = document.getElementById(id);
            if(a) { a.currentTime = 0; a.play().catch(()=>{}); }
        }

        function returnToStart() {
            document.querySelectorAll('.ghibli-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
            if(finishedPart.v && finishedPart.p3 && finishedPart.p4 && finishedPart.p5) {
                const b = document.getElementById('btn-comprehensive');
                b.disabled = false; b.style.backgroundColor = "#a8d5ba"; b.style.color = "#6d4c41"; b.innerText = "📝 Bài Tập Tổng Hợp";
            }
        }

        // FLASHCARD LOGIC
        function startFlashcards() {
            currentFlashcardIdx = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('flashcard-screen').classList.remove('hidden');
            showFlashcard();
        }
        function showFlashcard() {
            const c = vocabulary[currentFlashcardIdx];
            document.getElementById('card-hanzi').innerText = c.h;
            document.getElementById('card-pinyin').innerText = c.p;
            document.getElementById('card-mean').innerText = c.m;
            document.getElementById('card-example-cn').innerText = c.ex;
            document.getElementById('card-example-py').innerText = c.exp;
            document.getElementById('card-example-vi').innerText = "Dịch: " + c.exv;
            document.getElementById('card-index').innerText = currentFlashcardIdx + 1;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }
        function flipCard() { playAudio('audio-flip'); document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        function markCard(known) {
            currentFlashcardIdx++;
            if(currentFlashcardIdx < vocabulary.length) showFlashcard();
            else returnToStart();
        }

        // VOCAB GAME LOGIC
        function startVocabularyGame() {
            vgIdx = 0; vgScore = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('vocab-game-screen').classList.remove('hidden');
            showVocabStep();
        }
        function showVocabStep() {
            const c = vocabulary[vgIdx];
            document.getElementById('vg-step').innerText = vgIdx + 1;
            document.getElementById('vg-feedback').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.add('hidden');
            document.getElementById('vg-check-btn').classList.remove('hidden');
            
            let options = [c.m];
            while(options.length < 4) {
                let r = vocabulary[Math.floor(Math.random()*vocabulary.length)].m;
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);

            document.getElementById('vg-content').innerHTML = `
                <div class="text-6xl chinese-text text-amber-900 mb-8">${c.h}</div>
                <div class="grid grid-cols-1 gap-3 w-full" id="vg-opts">
                    ${options.map(o => `<button onclick="selectVocabOpt(this, '${o}')" class="btn-ghibli bg-white">${o}</button>`).join('')}
                </div>`;
        }
        let selectedVocab = '';
        function selectVocabOpt(btn, val) {
            playAudio('audio-click');
            document.querySelectorAll('#vg-opts button').forEach(b => b.classList.remove('border-amber-900', 'bg-amber-100'));
            btn.classList.add('border-amber-900', 'bg-amber-100');
            selectedVocab = val;
        }
        function checkVocabGame() {
            if(!selectedVocab) return;
            const correct = vocabulary[vgIdx].m;
            const fb = document.getElementById('vg-feedback');
            fb.classList.remove('hidden');
            if(selectedVocab === correct) {
                vgScore++; playAudio('audio-correct');
                fb.innerText = "Chính xác! ✨"; fb.className = "mt-4 p-3 rounded-lg text-center font-bold bg-emerald-100 text-emerald-700";
            } else {
                playAudio('audio-wrong');
                fb.innerText = "Sai rồi! Đáp án là: " + correct; fb.className = "mt-4 p-3 rounded-lg text-center font-bold bg-rose-100 text-rose-700";
            }
            document.getElementById('vg-check-btn').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.remove('hidden');
        }
        function nextVocabStep() {
            vgIdx++; selectedVocab = '';
            if(vgIdx < vocabulary.length) showVocabStep();
            else {
                finishedPart.v = true; results.vocab = vgScore;
                document.getElementById('check-vocab').classList.remove('hidden');
                showEndScreen(`Hoàn thành Game Từ Vựng: ${vgScore}/15`);
            }
        }

        // QUIZ LOGIC
        function startQuiz(part) {
            currentQuizKey = part; quizIdx = 0; quizScore = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            document.getElementById('quiz-part-name').innerText = quizData[part].name;
            showQuizQuestion();
        }
        function showQuizQuestion() {
            const q = quizData[currentQuizKey].questions[quizIdx];
            document.getElementById('quiz-idx-display').innerText = quizIdx + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-container').classList.add('hidden');
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-ghibli text-left bg-white"; btn.innerText = opt;
                btn.onclick = () => {
                    document.getElementById('explanation-container').classList.remove('hidden');
                    if(idx === q.correct) {
                        quizScore++; playAudio('audio-correct');
                        document.getElementById('feedback-title').innerText = "Chính xác! ✨";
                    } else {
                        playAudio('audio-wrong');
                        document.getElementById('feedback-title').innerText = "Chưa đúng! ❌";
                    }
                    document.getElementById('exp-full-sentence').innerText = q.res;
                    document.getElementById('exp-pinyin').innerText = q.py;
                    document.getElementById('exp-translation').innerText = "Dịch: " + q.vi;
                    document.getElementById('explanation-text').innerText = "💡 " + q.exp;
                    container.querySelectorAll('button').forEach(b => b.disabled = true);
                };
                container.appendChild(btn);
            });
        }
        function showNextQuestion() {
            quizIdx++;
            if(quizIdx < 10) showQuizQuestion();
            else {
                finishedPart[currentQuizKey] = true; results[currentQuizKey] = quizScore;
                document.getElementById('check-'+currentQuizKey).classList.remove('hidden');
                showEndScreen(`Hoàn thành ${quizData[currentQuizKey].name}: ${quizScore}/10`);
            }
        }

        function showEndScreen(txt) {
            document.querySelectorAll('.ghibli-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('result-text').innerText = txt;
        }

        // EXERCISE LOGIC (COPY TỪ FILE CỦA BẠN)
        function showExercise() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('exercise-screen').classList.remove('hidden');
        }

        function checkExerciseScoreOnly() {
            const selects = document.querySelectorAll('.ex-select');
            const correctAns = ["作业", "周末", "游戏", "带", "跟"];
            exerciseCorrect = 0;
            selects.forEach((s, i) => { if(s.value === correctAns[i]) exerciseCorrect++; });
            const fb = document.getElementById('exercise-feedback');
            fb.classList.remove('hidden');
            fb.innerText = `Điểm của bạn: ${exerciseCorrect}/5 (Chỉ tính phần điền từ).`;
        }

        function submitExercise() {
            let res = `--- KẾT QUẢ HSK3 BÀI 1 ---\n`;
            res += `Từ vựng: ${results.vocab}/15\nNgữ pháp V+好: ${results.p3}/10\nPhủ định: ${results.p4}/10\nLiên từ 那: ${results.p5}/10\n`;
            res += `Điền từ: ${exerciseCorrect}/5\n`;
            navigator.clipboard.writeText(res).then(() => {
                alert("Đã sao chép toàn bộ kết quả! Hãy gửi cho cô giáo.");
            });
        }
    </script>
