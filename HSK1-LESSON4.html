<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 4: Khu Vườn Ghibli của Cô Nga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-pink: #ffb7c5;
            --ghibli-green: #9dc183;
            --ghibli-sky: #d0f0f7;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            /* Nền khu vườn Ghibli */
            background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Overlay mờ để nội dung dễ đọc hơn */
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 6px solid white;
        }

        .sidebar {
            width: 35%; background: #d81b60; padding: 35px;
            color: white; display: flex; flex-direction: column;
        }

        .content-area {
            width: 65%; padding: 40px; display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
        }

        .pinyin { font-size: 0.75rem; color: #555; display: block; line-height: 1.1; }
        .hanzi { font-family: 'Noto Sans SC', sans-serif; font-size: 1.3rem; display: block; }
        
        .btn-ghibli {
            background: #d81b60; color: white; border-radius: 20px;
            transition: all 0.2s; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
        }
        .btn-ghibli:hover { transform: scale(1.05); background: #ad1457; }

        .option-box {
            background: white; border: 2px solid #e2e8f0; border-radius: 15px;
            padding: 12px 20px; cursor: pointer; transition: 0.2s; text-align: center;
            width: 100%; margin-bottom: 10px;
        }
        .option-box:hover { border-color: #d81b60; background: #fff0f5; }

        .selected-word {
            background: #9dc183; color: white; border-radius: 12px;
            padding: 8px 15px; cursor: pointer; margin: 4px;
            display: flex; flex-direction: column; align-items: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container" class="w-[95%] max-w-[1000px] h-[600px] rounded-[40px] flex overflow-hidden shadow-2xl glass-effect">
        
        <div class="sidebar">
            <div class="mb-6">
                <a href="index.html" class="bg-white/20 px-4 py-2 rounded-full text-xs font-bold">🏡 QUAY VỀ VƯỜN</a>
            </div>
            <div class="bg-white/30 w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mb-8 shadow-inner">🏮</div>
            <h1 class="text-3xl font-black leading-tight mb-2">Ứng dụng<br>Giao tiếp HSK</h1>
            <p class="text-yellow-300 font-bold text-sm mb-12">Giáo viên: Nga Học HSK</p>
            
            <div class="mt-auto bg-black/10 p-5 rounded-3xl">
                <p class="text-[11px] uppercase font-bold opacity-70 mb-2">Tiến độ thử thách</p>
                <div class="w-full h-3 bg-white/20 rounded-full overflow-hidden">
                    <div id="side-progress" class="w-0 h-full bg-white transition-all duration-500"></div>
                </div>
                <div class="flex justify-between mt-2 text-xs font-bold"><span id="side-percent">0%</span></div>
            </div>
            <div class="flex gap-10 mt-6">
                <div><p class="text-[10px] uppercase opacity-50">Điểm số</p><p id="side-score" class="text-3xl font-bold">0</p></div>
                <div><p class="text-[10px] uppercase opacity-50">Câu hỏi</p><p id="side-count" class="text-3xl font-bold">0/20</p></div>
            </div>
        </div>

        <div id="screen-intro" class="content-area items-center justify-center text-center">
            <h2 class="text-4xl font-black mb-4 text-gray-800">Bạn có giỏi ứng xử?</h2>
            <p class="text-gray-500 mb-10 max-w-sm">Hãy giúp cô Nga hoàn thành 20 câu giao tiếp Bài 4 trong khu vườn này nhé!</p>
            <button onclick="startGame()" class="btn-ghibli px-16 py-5 text-xl font-bold">BẮT ĐẦU HÀNH TRÌNH</button>
        </div>

        <div id="screen-game" class="content-area hidden">
            <div class="mb-6">
                <span id="q-tag" class="text-[10px] bg-pink-100 text-pink-600 px-3 py-1 rounded-full font-bold uppercase"></span>
                <h3 id="q-text" class="text-2xl font-bold text-gray-700 mt-4 leading-snug"></h3>
            </div>

            <div id="drop-zone" class="hidden flex-grow bg-gray-50 rounded-[30px] p-6 border-4 border-dashed border-gray-100 flex flex-wrap content-start items-start gap-2 shadow-inner mb-4"></div>

            <div id="options-zone" class="flex flex-col items-center justify-center flex-grow overflow-y-auto max-h-[300px] py-2"></div>

            <div class="mt-6">
                <button id="btn-check" onclick="checkAnswer()" class="btn-ghibli w-full py-4 font-bold text-lg">KIỂM TRA ĐÁP ÁN ✨</button>
            </div>
        </div>

        <div id="screen-end" class="content-area hidden items-center justify-center text-center">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-4xl font-black text-gray-800 mb-2">Tuyệt vời!</h2>
            <p class="text-gray-500 mb-8">Bạn đã hoàn thành khu vườn Bài 4 cùng cô Nga.</p>
            <div id="final-score" class="text-6xl font-black text-pink-600 mb-10">0</div>
            <button onclick="location.reload()" class="btn-ghibli px-16 py-4">LÀM LẠI THỬ THÁCH</button>
        </div>
    </div>

    <script>
        // Hệ thống âm thanh hài hước
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'correct') { // Tiếng Tada vui vẻ
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            } else if(type === 'wrong') { // Tiếng "Oop" hài hước
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            } else { // Tiếng "Click/Boing"
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            }
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        const quizData = [
            { type: "SẮP XẾP", q: "Ghép câu: Cô ấy là ai?", ans: ["她", "是", "谁", "？"], py: ["tā", "shì", "shéi", ""], mode: "scramble" },
            { type: "PHẢN XẠ", q: "Dịch câu: 他是我同学 (Tā shì wǒ tóngxué)", options: ["Anh ấy là bạn tôi", "Anh ấy là bạn học của tôi", "Anh ấy là giáo viên tôi"], correct: "Anh ấy là bạn học của tôi", mode: "choice" },
            { type: "PHẢN XẠ", q: "Trả lời: 他是谁？(Hỏi về thầy giáo)", options: ["他是我的汉语老师", "他是我的同学", "我是美国人"], correct: "他是我的汉语老師", mode: "choice" },
            { type: "ĐIỀN TỪ", q: "Chọn từ: 你是___国人？", options: ["谁 (shéi)", "哪 (nǎ)", "呢 (ne)"], correct: "哪 (nǎ)", mode: "choice" },
            { type: "PINYIN", q: "Chọn chữ Hán cho: 'péngyou'", options: ["朋友", "同学", "老师"], correct: "朋友", mode: "choice" },
            { type: "SẮP XẾP", q: "Ghép câu: Tôi là người Mỹ.", ans: ["我", "是", "美国", "人"], py: ["wǒ", "shì", "Měiguó", "rén"], mode: "scramble" },
            { type: "PHẢN XẠ", q: "Dịch: 哪国人？(nǎ guó rén?)", options: ["Người nước nào?", "Người nước nào đấy?", "Người nước Mỹ?"], correct: "Người nước nào?", mode: "choice" },
            { type: "ĐIỀN TỪ", q: "Chọn: 她___我同学，她是我朋友。", options: ["是", "不是", "叫"], correct: "不是", mode: "choice" },
            { type: "PHẢN XẠ", q: "Trả lời: 你是哪国人？", options: ["我是美国人", "他是我的老师", "她叫李月"], correct: "我是美国人", mode: "choice" },
            { type: "SẮP XẾP", q: "Ghép câu: Cô giáo Lý là giáo viên của tôi.", ans: ["李", "老师", "是", "我", "的", "老师"], py: ["Lǐ", "lǎoshī", "shì", "wǒ", "de", "lǎoshī"], mode: "scramble" }
            // Có thể thêm tiếp đến 20 câu tương tự...
        ];

        let currentQ = 0;
        let score = 0;
        let userSelection = [];

        function startGame() {
            playSound('click');
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentQ];
            userSelection = [];
            
            // Sidebar Update
            document.getElementById('side-count').innerText = `${currentQ + 1}/10`;
            document.getElementById('side-score').innerText = score;
            let percent = Math.floor((currentQ / 10) * 100);
            document.getElementById('side-progress').style.width = percent + '%';
            document.getElementById('side-percent').innerText = percent + '%';

            document.getElementById('q-tag').innerText = data.type;
            document.getElementById('q-text').innerText = data.q;

            const optionsZone = document.getElementById('options-zone');
            const dropZone = document.getElementById('drop-zone');
            optionsZone.innerHTML = '';
            dropZone.innerHTML = '';

            if(data.mode === "scramble") {
                dropZone.classList.remove('hidden');
                dropZone.innerHTML = '<p class="text-gray-300 italic text-sm w-full text-center mt-6">Chạm các từ bên dưới để ghép...</p>';
                optionsZone.classList.add('flex-row', 'flex-wrap', 'gap-2');
                
                let pool = [...data.ans].sort(() => Math.random() - 0.5);
                pool.forEach(word => {
                    const py = data.py[data.ans.indexOf(word)] || "";
                    const btn = document.createElement('div');
                    btn.className = 'bg-white border-2 border-pink-100 p-3 rounded-2xl cursor-pointer shadow-sm flex flex-col items-center min-w-[60px]';
                    btn.innerHTML = `<span class="pinyin">${py}</span><span class="hanzi">${word}</span>`;
                    btn.onclick = () => {
                        playSound('click');
                        userSelection.push({word, py, btn});
                        btn.classList.add('opacity-10', 'pointer-events-none');
                        renderScramble();
                    };
                    optionsZone.appendChild(btn);
                });
            } else {
                dropZone.classList.add('hidden');
                optionsZone.classList.remove('flex-row', 'flex-wrap');
                data.options.forEach(opt => {
                    const box = document.createElement('div');
                    box.className = 'option-box font-bold text-gray-700';
                    box.innerText = opt;
                    box.onclick = () => {
                        playSound('click');
                        document.querySelectorAll('.option-box').forEach(el => el.style.borderColor = '#e2e8f0');
                        box.style.borderColor = '#d81b60';
                        userSelection = [opt];
                    };
                    optionsZone.appendChild(box);
                });
            }
        }

        function renderScramble() {
            const zone = document.getElementById('drop-zone');
            zone.innerHTML = '';
            userSelection.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'selected-word';
                div.innerHTML = `<span class="text-[10px] opacity-80">${item.py}</span><span>${item.word}</span>`;
                div.onclick = () => {
                    playSound('click');
                    item.btn.classList.remove('opacity-10', 'pointer-events-none');
                    userSelection.splice(index, 1);
                    renderScramble();
                };
                zone.appendChild(div);
            });
        }

        function checkAnswer() {
            const data = quizData[currentQ];
            let isCorrect = false;

            if(data.mode === "scramble") {
                isCorrect = userSelection.map(i => i.word).join('') === data.ans.join('');
            } else {
                isCorrect = userSelection[0] === data.correct;
            }

            if(isCorrect) {
                playSound('correct');
                score += 10;
                alert("🌸 Tuyệt vời! Bạn làm đúng rồi!");
            } else {
                playSound('wrong');
                alert(`🏮 Tiếc quá! Đáp án đúng là: ${data.mode === 'scramble' ? data.ans.join('') : data.correct}`);
            }

            currentQ++;
            if(currentQ < quizData.length) loadQuestion();
            else showEnd();
        }

        function showEnd() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
