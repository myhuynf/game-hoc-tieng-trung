<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 4: Khu Vườn Ghibli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green-dark: #4f7942;
            --ghibli-green-light: #9dc183;
            --ghibli-sky: #d0f0f7;
        }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .glass-effect { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); border: 8px solid white; border-radius: 40px; }
        .sidebar { width: 32%; background: var(--ghibli-green-dark); padding: 30px; color: white; display: flex; flex-direction: column; }
        .content-area { width: 68%; padding: 40px; display: flex; flex-direction: column; background: rgba(208, 240, 247, 0.2); }
        .btn-ghibli { background: var(--ghibli-green-dark); color: white; border-radius: 20px; transition: 0.2s; cursor: pointer; border: 4px solid white; }
        .btn-ghibli:hover { transform: scale(1.03); background: #3d5e33; }
        .option-card { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.2s; width: 100%; text-align: left; margin-bottom: 10px; font-weight: bold; }
        .option-card:hover { border-color: var(--ghibli-green-light); background: #f0fdf4; }
        .word-tag { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .selected-tag { background: var(--ghibli-green-light); color: white; border-radius: 12px; padding: 8px 15px; cursor: pointer; margin: 4px; animation: pop 0.3s; }
        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container" class="w-[95%] max-w-[1050px] h-[620px] flex overflow-hidden glass-effect shadow-2xl">
        <div class="sidebar">
            <div class="mb-4">
                <a href="index.html" class="bg-white/20 px-4 py-2 rounded-full text-[10px] font-bold text-white flex gap-2 items-center w-fit">🏡 QUAY VỀ VƯỜN</a>
            </div>
            <div class="bg-white/20 w-16 h-16 rounded-3xl flex items-center justify-center text-4xl mb-6">🌿</div>
            <h1 class="text-2xl font-black mb-2 leading-tight">Giao tiếp HSK<br>Bài 4</h1>
            <p class="text-yellow-200 font-bold text-xs mb-10 italic">Giáo viên: Nga Học HSK</p>
            
            <div class="mt-auto bg-black/10 p-5 rounded-3xl">
                <p class="text-[10px] uppercase font-bold opacity-70 mb-2">Tiến độ</p>
                <div class="w-full h-2 bg-white/20 rounded-full overflow-hidden">
                    <div id="side-progress" class="w-0 h-full bg-white transition-all"></div>
                </div>
                <div class="flex justify-between mt-2 text-[10px] font-bold"><span id="side-percent">0%</span></div>
            </div>
            <div class="flex gap-10 mt-6">
                <div><p class="text-[10px] uppercase opacity-50">Điểm</p><p id="side-score" class="text-3xl font-bold text-yellow-300">0</p></div>
                <div><p class="text-[10px] uppercase opacity-50">Câu</p><p id="side-count" class="text-3xl font-bold">1/20</p></div>
            </div>
        </div>

        <div id="screen-intro" class="content-area items-center justify-center text-center">
            <h2 class="text-4xl font-black mb-4 text-gray-800">Bắt đầu Bài 4 thôi!</h2>
            <p class="text-gray-600 mb-10 max-w-sm">Chào mừng bạn quay lại khu vườn. Hãy cùng ôn tập các từ về quốc tịch và bạn bè nhé.</p>
            <button onclick="startGame()" class="btn-ghibli px-16 py-5 text-xl font-bold uppercase">BẮT ĐẦU HỌC</button>
        </div>

        <div id="screen-game" class="content-area hidden">
            <div class="mb-4">
                <span id="q-type" class="text-[10px] bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold uppercase"></span>
                <h3 id="q-text" class="text-xl font-bold text-gray-800 mt-3"></h3>
            </div>

            <div id="interaction-zone" class="flex-grow flex flex-col justify-center">
                </div>

            <div class="mt-4">
                <button id="check-btn" onclick="checkAnswer()" class="btn-ghibli w-full py-4 text-lg font-bold uppercase">KIỂM TRA</button>
            </div>
        </div>

        <div id="screen-end" class="content-area hidden items-center justify-center text-center">
            <div class="text-7xl mb-6">🎈</div>
            <h2 class="text-4xl font-black text-gray-800 mb-2">Hoàn thành!</h2>
            <p class="text-gray-600 mb-8">Bạn đã chăm sóc khu vườn rất tốt.</p>
            <div id="final-score" class="text-7xl font-black text-green-700 mb-10">0</div>
            <button onclick="location.reload()" class="btn-ghibli px-12 py-4 text-xl font-bold">LÀM LẠI</button>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 max-w-md w-full shadow-2xl border-[8px] border-white">
            <div id="modal-emoji" class="text-6xl text-center mb-4">🌟</div>
            <h3 id="modal-title" class="text-2xl font-black text-center mb-4">Kết quả</h3>
            <div class="bg-gray-50 rounded-2xl p-5 mb-6">
                <p class="text-xs font-bold text-gray-400 uppercase mb-2">Giải thích:</p>
                <div id="modal-explanation" class="text-gray-700 text-sm leading-relaxed"></div>
            </div>
            <button onclick="nextStep()" class="btn-ghibli w-full py-4 text-lg font-bold uppercase">TIẾP THEO</button>
        </div>
    </div>

    <script>
        const quizData = [
            { type: "PINYIN", q: "Chọn Pinyin đúng cho chữ: 谁", options: ["shéi", "shénme", "nǎ"], correct: "shéi", explain: "谁 (shéi) có nghĩa là 'ai', dùng để hỏi về người." },
            { type: "DỊCH NGHĨA", q: "Chữ '同学' nghĩa là gì?", options: ["Bạn học", "Bạn bè", "Giáo viên"], correct: "Bạn học", explain: "同学 (tóngxué) là bạn cùng học/bạn cùng lớp." },
            { type: "ĐIỀN TỪ", q: "你是____国人？", options: ["谁", "哪", "什么"], correct: "哪", explain: "Cấu trúc hỏi quốc tịch: 哪 (nào) + 国 (nước) + 人 (người)?" },
            { type: "PHẢN XẠ", q: "Trả lời câu hỏi: 他是谁？", options: ["他是我的汉语老师", "他是美国人", "他是我的同学"], correct: "Chấp nhận tất cả", isMulti: true, explain: "Cả 3 đều đúng ngữ pháp, nhưng trong bài này ta chọn đáp án phổ biến nhất là '他是我的汉语老师'." },
            { type: "SẮP XẾP", q: "Ghép câu: Cô ấy là bạn của tôi.", ans: ["她", "是", "我", "的", "朋友"], explain: "Chủ ngữ + 是 + Cụm danh từ sở hữu (Đại từ + 的 + Danh từ)." },
            { type: "PINYIN", q: "Chọn chữ Hán cho Pinyin: Hànyǔ", options: ["汉语", "英语", "国语"], correct: "汉语", explain: "汉语 (Hànyǔ) là Tiếng Hán / Tiếng Trung." },
            { type: "DỊCH NGHĨA", q: "Cụm '我的老师' dịch là gì?", options: ["Giáo viên của tôi", "Tôi là giáo viên", "Học sinh của tôi"], correct: "Giáo viên của tôi", explain: "Cấu trúc: A + 的 + B nghĩa là B của A." },
            { type: "SẮP XẾP", q: "Ghép câu: Bạn là người nước nào?", ans: ["你", "是", "哪", "国", "人", "？"], explain: "Đây là cấu trúc hỏi quốc tịch chuẩn trong Bài 4." },
            { type: "ĐIỀN TỪ", q: "她___我的汉语老师。", options: ["叫", "是", "哪"], correct: "是", explain: "Sử dụng động từ '是' (là) để giới thiệu nghề nghiệp/quan hệ." },
            { type: "PHẢN XẠ", q: "Câu '他是我的同学' nghĩa là gì?", options: ["Anh ấy là bạn học của tôi", "Anh ấy là bạn của tôi", "Anh ấy là giáo viên của tôi"], correct: "Anh ấy là bạn học của tôi", explain: "Phân biệt 同学 (bạn học) và 朋友 (bạn bè)." },
            { type: "PINYIN", q: "Pinyin của chữ '朋友' là gì?", options: ["péngyou", "tóngxué", "lǎoshī"], correct: "péngyou", explain: "朋友 (péngyou) nghĩa là bạn bè." },
            { type: "SẮP XẾP", q: "Ghép câu: Tôi không phải người Mỹ.", ans: ["我", "不", "shì", "美国", "人"], explain: "Phủ định của '是' là '不是' (bù shì)." },
            { type: "DỊCH NGHĨA", q: "Chữ '哪' nghĩa là gì?", options: ["Nào", "Ai", "Cái gì"], correct: "Nào", explain: "哪 (nǎ) dùng trong câu hỏi lựa chọn (nào, đâu)." },
            { type: "PHẢN XẠ", q: "Chọn câu trả lời: 你是哪国人？", options: ["我是美国人", "他是中国人", "谁是美国人"], correct: "我是美国人", explain: "Hỏi 'bạn' (你) thì phải trả lời là 'tôi' (我)." },
            { type: "ĐIỀN TỪ", q: "他叫____名字？", options: ["谁", "什么", "哪"], correct: "什么", explain: "Cấu trúc hỏi tên: 叫 + 什么 + 名字?" },
            { type: "PINYIN", q: "Chữ nào có pinyin là 'nǎ'?", options: ["哪", "那", "呢"], correct: "哪", explain: "哪 (nǎ - thanh 3) là 'nào'. Tránh nhầm với 那 (nà - thanh 4) là 'kia'." },
            { type: "SẮP XẾP", q: "Ghép câu: Cô ấy là người nước nào?", ans: ["她", "shì", "哪", "国", "人", "？"], explain: "Thay '你' bằng '她' để hỏi về quốc tịch của cô ấy." },
            { type: "DỊCH NGHĨA", q: "'美国人' là người nước nào?", options: ["Người Mỹ", "Người Anh", "Người Trung Quốc"], correct: "Người Mỹ", explain: "美国 (Měiguó) là nước Mỹ." },
            { type: "ĐIỀN TỪ", q: "我不是老师，我___学生。", options: ["叫", "是", "的"], correct: "偏是", explain: "Sử dụng '是' để khẳng định danh tính." },
            { type: "SẮP XẾP", q: "Ghép câu: Thầy giáo của tôi là người Trung Quốc.", ans: ["我", "de", "老师", "shì", "中国", "人"], explain: "Cụm danh từ làm chủ ngữ: 'Giáo viên của tôi'." }
        ];

        // Chuẩn hóa s/shì/de
        quizData.forEach(item => {
            if(item.ans) item.ans = item.ans.map(w => w === 'shì' ? '是' : w === 'de' ? '的' : w);
            if(item.correct === '偏 là') item.correct = '是';
        });

        let currentQ = 0, score = 0, userSelection = [];

        function startGame() {
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentQ];
            userSelection = [];
            document.getElementById('side-count').innerText = `${currentQ + 1}/20`;
            document.getElementById('side-score').innerText = score;
            document.getElementById('side-progress').style.width = (currentQ / 20 * 100) + '%';
            document.getElementById('side-percent').innerText = Math.floor(currentQ / 20 * 100) + '%';
            
            document.getElementById('q-type').innerText = data.type;
            document.getElementById('q-text').innerText = data.q;
            
            const zone = document.getElementById('interaction-zone');
            zone.innerHTML = '';

            if(data.type === "SẮP XẾP") {
                const dropZone = document.createElement('div');
                dropZone.className = "flex flex-wrap gap-2 mb-8 p-4 bg-white/50 rounded-2xl min-h-[80px] border-2 border-dashed border-gray-300";
                dropZone.id = "drop-zone";
                zone.appendChild(dropZone);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = "flex flex-wrap gap-2 justify-center";
                let pool = [...data.ans].sort(() => Math.random() - 0.5);
                pool.forEach(word => {
                    const tag = document.createElement('button');
                    tag.className = "word-tag";
                    tag.innerText = word;
                    tag.onclick = () => {
                        userSelection.push({word, btn: tag});
                        tag.classList.add('opacity-10', 'pointer-events-none');
                        renderScramble(dropZone);
                    };
                    optionsDiv.appendChild(tag);
                });
                zone.appendChild(optionsDiv);
            } else {
                data.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-card";
                    btn.innerText = opt;
                    btn.onclick = () => {
                        document.querySelectorAll('.option-card').forEach(b => b.classList.remove('border-green-600', 'bg-green-50'));
                        btn.classList.add('border-green-600', 'bg-green-50');
                        userSelection = [opt];
                    };
                    zone.appendChild(btn);
                });
            }
        }

        function renderScramble(zone) {
            zone.innerHTML = '';
            userSelection.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "selected-tag";
                div.innerText = item.word;
                div.onclick = () => {
                    item.btn.classList.remove('opacity-10', 'pointer-events-none');
                    userSelection.splice(idx, 1);
                    renderScramble(zone);
                };
                zone.appendChild(div);
            });
        }

        function checkAnswer() {
            if(userSelection.length === 0) return;
            const data = quizData[currentQ];
            let isCorrect = false;

            if(data.type === "SẮP XẾP") {
                isCorrect = userSelection.map(i => i.word).join('') === data.ans.join('');
            } else if(data.isMulti) {
                isCorrect = true;
            } else {
                isCorrect = userSelection[0] === data.correct;
            }

            const modal = document.getElementById('result-modal');
            document.getElementById('modal-emoji').innerText = isCorrect ? "🌟" : "🏮";
            document.getElementById('modal-title').innerText = isCorrect ? "Chính xác!" : "Cố gắng lên!";
            document.getElementById('modal-title').className = isCorrect ? "text-2xl font-black text-center mb-4 text-green-600" : "text-2xl font-black text-center mb-4 text-red-500";
            
            let correctStr = data.type === "SẮP XẾP" ? data.ans.join(' ') : (data.correct || "Đáp án linh hoạt");
            document.getElementById('modal-explanation').innerHTML = `<b>Đáp án:</b> <span class="text-green-700 font-bold">${correctStr}</span><br><br>${data.explain}`;
            
            if(isCorrect) score += 10;
            modal.classList.remove('hidden');
        }

        function nextStep() {
            document.getElementById('result-modal').classList.add('hidden');
            currentQ++;
            if(currentQ < quizData.length) loadQuestion();
            else {
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('screen-end').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
    </script>
</body>
</html>
