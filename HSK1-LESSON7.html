<!DOCTYPE html>
<html lang="vi">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;

        .sidebar {

        .btn-home {

        .btn-back-menu {
            background: white; 
            color: var(--ghibli-dark-green); 
            padding: 8px 16px; 
            border-radius: 20px;
            font-size: 0.85rem; 
            font-weight: 700; 
            border: 2px solid var(--ghibli-green);
            cursor: pointer; 
            margin-bottom: 20px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 3px 0 var(--ghibli-green);
            transition: 0.2s;
        }
        .btn-back-menu:hover {
            background: var(--ghibli-green);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 var(--ghibli-dark-green);

            transform: translateY(1px);

        }

        .app-title { font-size: 1.8rem; font-weight: 700; margin: 0; line-height: 1.2; }

        .progress-bar-fill { height: 100%; background: var(--ghibli-pink); width: 0%; transition: 0.5s; }

        .main-content { flex-grow: 1; padding: 40px; display: flex; justify-content: center; align-items: center; }

        .quiz-card {
            background: var(--white-glass); width: 100%; max-width: 800px;
            padding: 40px; border-radius: 30px; border: 4px solid var(--ghibli-green);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative;
        }

        /* Menu Styles */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .menu-btn {
            background: white; border: 2px solid var(--ghibli-green); padding: 25px;

        }
        .menu-btn:hover { transform: translateY(-5px); background: #f0f9f0; }
        .menu-btn h3 { margin: 0; color: var(--ghibli-dark-green); }
        .menu-btn p { margin: 5px 0 0; color: #666; font-size: 0.9rem; }

        /* Flashcard Styles */
        .flashcard-container { perspective: 1000px; width: 100%; height: 400px; margin: 20px 0; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 25px; border: 2px solid var(--ghibli-green); background: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 30px; box-sizing: border-box; text-align: center;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f0f9f0; }
        .flashcard .cn { font-size: 4.5rem; color: var(--ghibli-dark-green); font-weight: bold; margin: 0; }
        .flashcard .pinyin { font-size: 1.5rem; color: #666; margin-top: 5px; }
        .flashcard .vi { font-size: 1.8rem; color: var(--ghibli-wood); font-weight: 700; margin-top: 10px; }
        
        .example-box {
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.7);
            border-radius: 15px; border-left: 5px solid var(--ghibli-pink); width: 100%;
        }
        .example-cn { font-size: 1.2rem; color: #333; font-weight: 600; }
        .example-p { font-size: 0.9rem; color: #777; font-style: italic; margin: 4px 0; }
        .example-v { font-size: 1rem; color: var(--ghibli-dark-green); }

        /* Vocab Results */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { padding: 15px; border-radius: 15px; background: #f9f9f9; border: 2px solid #eee; text-align: center;}
        .stat-item.green { border-color: var(--success-color); color: var(--success-color); }
        .stat-item.red { border-color: var(--error-color); color: var(--error-color); }
        .stat-val { font-size: 1.8rem; font-weight: bold; }
        .review-list { text-align: left; background: #fffaf0; border-radius: 20px; padding: 20px; border: 1px solid #ffe4b5; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }

        /* Quiz Styles */
        .tag-situation { background: var(--ghibli-green); color: white; padding: 6px 15px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        .question-text { font-size: 1.5rem; color: var(--ghibli-dark-green); margin-bottom: 30px; font-weight: 700; line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-item { background: white; border: 2px solid #e0e0e0; padding: 16px 20px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; font-size: 1.15rem; font-weight: 600; color: #444; }
        .option-item:hover { border-color: var(--ghibli-green); background: #f9fdf9; transform: translateX(5px); }
        .option-letter { width: 32px; height: 32px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 0.9rem; color: #888; flex-shrink: 0; }
        .slot-container { min-height: 80px; border: 3px dashed var(--ghibli-green); border-radius: 20px; background: rgba(255,255,255,0.5); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; padding: 15px; justify-content: center; align-items: center; }
        .chip { background: white; border: 2px solid var(--ghibli-wood); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; color: var(--ghibli-wood); box-shadow: 0 3px 0 var(--ghibli-wood); transition: 0.2s; }
        .chip.selected { opacity: 0.3; pointer-events: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { background: var(--ghibli-wood); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1rem; flex: 1; }
        .btn-success { background: var(--success-color); }
        .btn-error { background: var(--error-color); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; border-radius: 30px; padding: 35px; text-align: center; max-width: 450px; width: 90%; border: 6px solid var(--ghibli-pink); }
        .feedback-box { background: #f0f9eb; border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid var(--ghibli-green); }

        @media (max-width: 900px) { body { flex-direction: column; } .sidebar { width: 100%; } .flashcard-container { height: 450px; } }
    </style>
</head>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    const vocabData = [
        {cn: '请', p: 'qǐng', vi: 'mời, xin', ex: '请坐 (Qǐng zuò)', exVi: 'Mời ngồi.'},
        {cn: '问', p: 'wèn', vi: 'hỏi', ex: '请问，今天几号？ (Qǐngwèn, jīntiān jǐ hào?)', exVi: 'Xin hỏi, hôm nay ngày mấy?'},
        {cn: '今天', p: 'jīntiān', vi: 'hôm nay', ex: '今天星期五 (Jīntiān xīngqīwǔ)', exVi: 'Hôm nay là thứ sáu.'},
        {cn: '号', p: 'hào', vi: 'ngày', ex: '今天十号 (Jīntiān shí hào)', exVi: 'Hôm nay là ngày mùng 10.'},
        {cn: '月', p: 'yuè', vi: 'tháng', ex: '九月十号 (Jiǔyuè shí hào)', exVi: 'Ngày 10 tháng 9.'},
        {cn: '星期', p: 'xīngqī', vi: 'tuần, thứ', ex: '星期几？ (Xīngqī jǐ?)', exVi: 'Thứ mấy?'},
        {cn: '昨天', p: 'zuótiān', vi: 'hôm qua', ex: '昨天是星期四 (Zuótiān shì xīngqīsì)', exVi: 'Hôm qua là thứ năm.'},
        {cn: '明天', p: 'míngtiān', vi: 'ngày mai', ex: '明天 vỗ xem sách (Míngtiān wǒ qù kànshū)', exVi: 'Ngày mai tôi đi xem sách.'},
        {cn: '去', p: 'qù', vi: 'đi, đi đến', ex: '你去学校吗？ (Nǐ qù xuéxiào ma?)', exVi: 'Bạn đi học không?'},
        {cn: '学校', p: 'xuéxiào', vi: 'trường học', ex: '学校在哪儿？ (Xuéxiào zài nǎr?)', exVi: 'Trường học ở đâu?'},
        {cn: '看', p: 'kàn', vi: 'nhìn, xem, đọc', ex: '我看你 (Wǒ kàn nǐ)', exVi: 'Tôi nhìn bạn.'},
        {cn: '书', p: 'shū', vi: 'sách', ex: '这是一本书 (Zhè shì yī běn shū)', exVi: 'Đây là một quyển sách.'}
    ];

    const questions = [
        { type: 'choice', tag: 'Chào hỏi', question: 'Khi gặp thầy cô giáo hoặc người lớn tuổi, bạn chào thế nào cho lịch sự?', options: ['你好 (Nǐ hǎo)', '您好 (Nín hǎo)', '再见 (Zàijiàn)', '对不起 (Duìbuqǐ)'], answer: '您好 (Nín hǎo)', pinyin: 'Ghi nhớ: Dùng "您" (Ngài/Thầy/Cô) để thể hiện sự tôn kính.', trans: 'Dịch nghĩa: Con chào Thầy/Cô ạ.' },
        { type: 'choice', tag: 'Hội thoại', question: 'Người khác hỏi: "明天你去学校嗎？" (Mai bạn đi học không?). Bạn trả lời "Tôi không đi":', options: ['我不去 (Wǒ bù qù)', '我不喝 (Wǒ bù hē)', '我不看 (Wǒ bù kàn)', '我不叫 (Wǒ bù jiào)'], answer: '我不去 (Wǒ bù qù)', pinyin: 'Cấu trúc: Phủ định hành động đi "去" bằng phó từ "不".', trans: 'Dịch nghĩa: Tôi không đi học.' },
        { type: 'choice', tag: 'Ngữ pháp', question: 'Trong câu tiếng Trung, trạng ngữ chỉ thời gian thường đứng ở đâu?', options: ['Đứng trước hoặc sau chủ ngữ', 'Đứng ở cuối câu', 'Đứng sau động từ chính', 'Đứng sau tân ngữ'], answer: 'Đứng trước hoặc sau chủ ngữ', pinyin: 'Quy tắc vàng: Thời gian tuyệt đối KHÔNG đứng ở cuối câu.', trans: 'Cấu trúc: (Thời gian) + Chủ ngữ + (Thời gian) + Động từ.' },
        { type: 'choice', tag: 'Thời gian', question: 'Để hỏi hôm nay là ngày mấy, ta dùng câu nào?', options: ['今天几号？ (Jīntiān jǐ hào?)', '今天星期几？ (Jīntiān xīngqī jǐ?)', '明天几号？ (Míngtiān jǐ hào?)', '你是谁？ (Nǐ shì shuí?)'], answer: '今天几号？ (Jīntiān jǐ hào?)', pinyin: 'Hỏi ngày trong tháng dùng cụm từ "几号".', trans: 'Dịch nghĩa: Hôm nay ngày bao nhiêu?' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Tôi đi trường học đọc sách"', words: ['我', '去', '学校', '看书'], correct: '我去学校看书', pinyin: 'Câu liên động: Đi đâu đó (去 + Địa điểm) để thực hiện hành động (Động từ).', trans: 'Dịch nghĩa: Tôi đến trường để xem sách.' },
        { type: 'choice', tag: 'Giao tiếp', question: 'Cách rủ bạn đi thư viện vào ngày mai một cách tự nhiên:', options: ['明天我们去图书馆吧 (Míngtiān wǒmen qù túshūguǎn ba)', '图书馆在哪儿 (Túshūguǎn zài nǎr)', '我不去图书馆 (Wǒ bù qù túshūguǎn)', '谢谢你 (Xièxie nǐ)'], answer: '明天 chúng ta đi thư viện nhé' },
        { type: 'choice', tag: 'Từ vựng', question: 'Từ "Thứ 7" trong tiếng Trung là gì?', options: ['星期六 (Xīngqīliù)', '星期日 (Xīngqīrì)', '星期五 (Xīngqīwǔ)', '星期七 (Xīngqīqī)'], answer: '星期六 (Xīngqīliù)', pinyin: 'Lưu ý: Tiếng Trung tính từ Thứ Hai là số 1, nên Thứ Bảy là số 6.', trans: 'Dịch nghĩa: Thứ Bảy hàng tuần.' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Ngày mai tôi đi cửa hàng"', words: ['明天', '我', '去', '商店'], correct: '明天我去商店', pinyin: 'Trạng ngữ "明天" có thể đứng đầu câu hoặc sau "我".', trans: 'Dịch nghĩa: Ngày mai tôi đi mua đồ ở cửa hàng.' },
        { type: 'choice', tag: 'Thời gian', question: 'Cách hỏi "Hôm nay thứ mấy?" chính xác nhất:', options: ['今天几号？ (Jīntiān jǐ hào?)', '今天星期几？ (Jīntiān xīngqī jǐ?)', '今天几月？ (Jīntiān jǐ yuè?)', '明天几号？ (Míngtiān jǐ hào?)'], answer: '今天星期几？ (Jīntiān xīngqī jǐ?)', pinyin: 'Hỏi về thứ tự trong tuần dùng cụm "星期几".', trans: 'Dịch nghĩa: Hôm nay là thứ mấy thế?' },
        { type: 'choice', tag: 'Thời gian', question: 'Tháng 9 ngày 10 nói như thế nào?', options: ['九月十号 (Jiǔyuè shí hào)', '十月九号 (Shíyuè jiǔ hào)', '九月十月 (Jiǔyuè shí yuè)', '九号十月 (Jiǔhào shí yuè)'], answer: '九月十号 (Jiǔyuè shí hào)', pinyin: 'Trật tự: Đơn vị lớn (Tháng) đứng trước đơn vị nhỏ (Ngày).', trans: 'Dịch nghĩa: Ngày mùng 10 tháng 9.' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Hôm nay là thứ ba"', words: ['今天', '是', '星期', '二'], correct: '今天是星期二', pinyin: 'Trong câu phán đoán thời gian, từ "是" có thể dùng để nhấn mạnh.', trans: 'Dịch nghĩa: Hôm nay là thứ ba rồi.' },
        { type: 'choice', tag: 'Từ vựng', question: 'Hôm qua là ngày mấy?', options: ['昨天几号？ (Zuótiān jǐ hào?)', '明天几号？ (Míngtiān jǐ hào?)', '今天几号？ (Jīntiān jǐ hào?)', '哪天几号？ (Nǎtiān jǐ hào?)'], answer: '昨天几号？ (Zuótiān jǐ hào?)', pinyin: 'Phân biệt: 昨天 (Hôm qua), 今天 (Hôm nay), 明天 (Ngày mai).', trans: 'Dịch nghĩa: Hôm qua là ngày bao nhiêu?' },
        { type: 'choice', tag: 'Hội thoại', question: 'Bạn muốn mời bạn đi uống trà, bạn nói thế nào?', options: ['我们去喝茶吧 (Wǒmen qù hē chá ba)', 'Chúng ta xem sách nhé', 'Chúng ta ở nhà nhé', 'Tôi không uống trà'], answer: 'Chúng ta đi uống trà nhé' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Tháng này là tháng tám"', words: ['这个', '月', '是', '八月'], correct: '这个月 là tháng 8', pinyin: 'Sử dụng lượng từ "个" cho tháng: 这个月.', trans: 'Dịch nghĩa: Tháng này là tháng 8.' },
        { type: 'choice', tag: 'Từ vựng', question: 'Từ "Cửa hàng" trong tiếng Trung là gì?', options: ['商店 (Shāngdiàn)', '学校 (Xuéxiào)', '図書館 (Túshūguǎn)', '家 (Jiā)'], answer: '商店 (Shāngdiàn)', pinyin: 'Từ mới: 商店 (Shāngdiàn) nghĩa là cửa hàng hoặc cửa hiệu.', trans: 'Dịch nghĩa: Cửa hàng.' },
        { type: 'choice', tag: 'Ngữ pháp', question: 'Trong tiếng Trung, thứ tự nói ngày tháng năm là gì?', options: ['Năm - Tháng - Ngày', 'Ngày - Tháng - Năm', 'Tháng - Ngày - Năm', 'Năm - Ngày - Tháng'], answer: 'Năm - Tháng - Ngày', pinyin: 'Ghi nhớ: Quy tắc từ lớn đến bé (Năm -> Tháng -> Ngày).', trans: 'Ví dụ: 2024年3月5号.' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Bạn tên là gì?"', words: ['你', '叫', '什么', '名字'], correct: '你叫什么名字', pinyin: 'Cấu trúc hỏi tên cơ bản nhất trong HSK1.', trans: 'Dịch nghĩa: Bạn tên gọi là gì?' },
        { type: 'choice', tag: 'Giao tiếp', question: 'Bạn muốn nói: "Ngày mai tôi không đi học"', options: ['明天我不去学校 (Míngtiān wǒ bù qù xuéxiào)', 'Hôm nay tôi không đi học', 'Hôm qua tôi không đi học', 'Ngày mai tôi đi học'], answer: 'Ngày mai tôi không đi học' },
        { type: 'choice', tag: 'Thời gian', question: 'Chủ nhật trong tiếng Trung có hai cách nói là gì?', options: ['星期日 / 星期天', '星期六 / 星期日', '星期七 / 星期日', '星期天 / 星期六'], answer: '星期日 / 星期天', pinyin: 'Phân biệt: 星期日 (Văn viết) và 星期天 (Văn nói).', trans: 'Dịch nghĩa: Ngày Chủ Nhật.' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp câu: "Hôm nay là ngày 5 tháng 3"', words: ['今天', '三月', '五号'], correct: '今天三月五号', pinyin: 'Nhớ trật tự: Tháng (月) luôn đứng trước Ngày (号).', trans: 'Dịch nghĩa: Hôm nay là mùng 5 tháng 3.' }
    ];

    questions[5].answer = questions[5].options[0];
    questions[12].answer = questions[12].options[0];
    questions[17].answer = questions[17].options[0];

    let currentIdx = 0; let score = 0; let userSelection = [];
    let currentVocabIdx = 0; let memoryStatus = [];

    function resetToMenu() {
        location.reload();
    }

    // --- VOCABULARY MODULE ---
    function startVocab() {
        currentVocabIdx = 0;
        memoryStatus = new Array(vocabData.length).fill(null);
        document.getElementById('stat-score').innerText = "Vựng";
        renderVocab();
    }

    function renderVocab() {
        const v = vocabData[currentVocabIdx];
        const box = document.getElementById('game-box');
        document.getElementById('progress-fill').style.width = `${((currentVocabIdx + 1) / vocabData.length) * 100}%`;
        document.getElementById('stat-current').innerText = currentVocabIdx + 1;

        box.innerHTML = `
            <button class="btn-back-menu" onclick="resetToMenu()">🪴 Trở về Cổng Vườn</button>
            <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--ghibli-dark-green); margin-bottom:10px">
                <span>Ôn tập Từ vựng</span>
                <span>${currentVocabIdx + 1}/${vocabData.length}</span>
            </div>
            <div class="flashcard-container" onclick="this.querySelector('.flashcard').classList.toggle('flipped')">
                <div class="flashcard">
                    <div class="flashcard-face">
                        <div class="cn">${v.cn}</div>
                        <p style="color:#aaa; font-size:0.9rem; margin-top:20px">Chạm để xem nghĩa & ví dụ</p>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div class="pinyin">${v.p}</div>
                        <div class="vi">${v.vi}</div>
                        <div class="example-box">
                            <div style="font-size:0.8rem; color:var(--ghibli-pink); font-weight:bold; margin-bottom:5px">VÍ DỤ:</div>
                            <div class="example-cn">${v.ex}</div>
                            <div class="example-p">${v.exVi}</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="modal-btn btn-error" onclick="markVocab(false)">Chưa nhớ ❌</button>
                <button class="modal-btn btn-success" onclick="markVocab(true)">Đã nhớ ✅</button>
            </div>
        `;
    }

    function markVocab(isKnown) {
        playSound('correct');
        memoryStatus[currentVocabIdx] = isKnown;
        if (currentVocabIdx < vocabData.length - 1) {
            currentVocabIdx++;
            renderVocab();
        } else {
            showVocabSummary();
        }
    }

    function showVocabSummary() {
        const knownCount = memoryStatus.filter(x => x === true).length;
        const knownPercent = Math.round((knownCount / vocabData.length) * 100);
        const unknownPercent = 100 - knownPercent;
        
        let reviewHtml = '';
        let hasReview = false;
        memoryStatus.forEach((s, i) => {
            if (!s) {
                hasReview = true;
                reviewHtml += `<div class="review-item"><b>${vocabData[i].cn}</b> <span>${vocabData[i].p} - ${vocabData[i].vi}</span></div>`;
            }
        });

        document.getElementById('game-box').innerHTML = `
            <h2>Kết quả ôn tập</h2>
            <div class="stats-grid">
                <div class="stat-item green"><div>Đã thuộc</div><div class="stat-val">${knownPercent}%</div></div>
                <div class="stat-item red"><div>Chưa thuộc</div><div class="stat-val">${unknownPercent}%</div></div>
            </div>
            <p style="text-align:left"><b>Cần chú ý các từ:</b></p>
            <div class="review-list">${hasReview ? reviewHtml : '<p style="color:green; font-weight:bold">Tuyệt vời! Bạn thuộc hết 100% rồi!</p>'}</div>
            <div class="btn-group">
                <button class="modal-btn" onclick="startVocab()">ÔN LẠI</button>
                <button class="modal-btn" style="background:var(--ghibli-green)" onclick="resetToMenu()">CỔNG VƯỜN</button>
            </div>
        `;
    }

    // --- QUIZ MODULE ---
    function startGame() { 
        currentIdx = 0; score = 0; 
        document.getElementById('stat-score').innerText = "0";
        renderQuestion(); 
    }

    function renderQuestion() {
        if(currentIdx >= questions.length) { showResult(); return; }
        const q = questions[currentIdx];
        const box = document.getElementById('game-box');
        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('stat-current').innerText = currentIdx + 1;
        document.getElementById('stat-score').innerText = score;

        let html = `<button class="btn-back-menu" onclick="resetToMenu()">🪴 Trở về Cổng Vườn</button><br>`;
        html += `<span class="tag-situation">${q.tag}</span><h2 class="question-text">${q.question}</h2>`;
        
        if(q.type === 'choice') {
            html += `<div class="options-grid">`;
            q.options.forEach((opt, i) => {
                html += `<div class="option-item" onclick="checkChoice('${opt}')"><div class="option-letter">${String.fromCharCode(65+i)}</div>${opt}</div>`;
            });
            html += `</div>`;
        } else {
            userSelection = [];
            const shuffled = [...q.words].sort(() => Math.random() - 0.5);
            html += `<div class="slot-container" id="slots"></div><div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap">`;
            shuffled.forEach((w, i) => html += `<div class="chip" id="c-${i}" onclick="addWord('${w}',${i})">${w}</div>`);
            html += `</div><button class="modal-btn" style="width:100%; margin-top:20px" onclick="checkReorder()">KIỂM TRA ĐÁP ÁN</button>`;
        }
        box.innerHTML = html;
    }

    function checkChoice(val) {
        const q = questions[currentIdx];
        const isRight = val === q.answer;
        if(isRight) { score += 5; playSound('correct'); } else { playSound('wrong'); }
        showModal(isRight, isRight ? "Rất giỏi!" : `Sai rồi, đáp án đúng là: <br><b>${q.answer}</b>`, q.pinyin, q.trans);
    }

    function addWord(w, i) {
        const c = document.getElementById(`c-${i}`);
        if(c.classList.contains('selected')) return;
        c.classList.add('selected');
        userSelection.push({text: w, id: i});
        drawSlots();
    }

    function drawSlots() {
        const s = document.getElementById('slots'); s.innerHTML = "";
        userSelection.forEach((item, i) => {
            const div = document.createElement('div'); div.className = 'chip'; div.innerText = item.text;
            div.onclick = () => { document.getElementById(`c-${item.id}`).classList.remove('selected'); userSelection.splice(i, 1); drawSlots(); };
            s.appendChild(div);
        });
    }

    function checkReorder() {
        const q = questions[currentIdx];
        const userStr = userSelection.map(x=>x.text).join('');
        const isRight = userStr === q.correct.replace(/\s/g,'');
        if(isRight) { score += 5; playSound('correct'); } else { playSound('wrong'); }
        showModal(isRight, isRight ? "Chính xác!" : `Thứ tự đúng là: <br><b>${q.correct}</b>`, q.pinyin, q.trans);
    }

    function showModal(isRight, msg, highlight, trans) {
        document.getElementById('modal-icon').innerText = isRight ? "🌸" : "🍂";
        document.getElementById('modal-title').innerText = isRight ? "CHÍNH XÁC" : "CỐ GẮNG LÊN";
        document.getElementById('modal-msg').innerHTML = msg;
        document.getElementById('fb-highlight').innerText = highlight || "";
        document.getElementById('fb-trans').innerText = trans || "";
        document.getElementById('overlay').style.display = 'flex';
    }

    function nextQuestion() {
        document.getElementById('overlay').style.display = 'none';
        currentIdx++; renderQuestion();
    }

    function showResult() {
        document.getElementById('game-box').innerHTML = `<div style="text-align:center"><h2>Chúc mừng bạn!</h2><div style="font-size:3rem; color:var(--ghibli-dark-green)">${score} / 100 Điểm</div><p>Bạn đã hoàn thành thử thách bài 7.</p><button class="modal-btn" onclick="resetToMenu()">QUAY LẠI CỔNG VƯỜN</button></div>`;
    }
</script>
</body>
</html>
