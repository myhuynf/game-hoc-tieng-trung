<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn HSK - Bài 7: 今天几号？</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
        }

        body {
            margin: 0; font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky) url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 15px; background: rgba(255, 255, 255, 0.85);
            width: 100%; border-bottom: 5px solid var(--ghibli-green); backdrop-filter: blur(5px);
        }

        .main-layout {
            display: flex; gap: 20px; width: 95%; max-width: 1100px; margin: 20px auto;
        }

        .game-side { flex: 2; }
        
        /* KHU VỰC CÂY */
        .tree-side {
            flex: 1; background: rgba(255, 255, 255, 0.85);
            border: 3px solid white; border-radius: 25px;
            height: 550px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: 30px; position: sticky; top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #tree-container {
            position: relative; width: 200px; height: 300px;
            display: flex; justify-content: center; align-items: flex-end;
        }

        /* Thân cây khô */
        .trunk {
            width: 20px; height: 150px; background: var(--ghibli-wood);
            border-radius: 10px 10px 0 0; position: relative;
        }

        /* Cành cây mọc lá */
        .leaf-container {
            position: absolute; width: 250px; height: 250px;
            top: -100px; display: flex; flex-wrap: wrap;
            justify-content: center; align-content: center; gap: 5px;
        }

        .leaf {
            font-size: 24px; transition: all 0.5s ease;
            opacity: 0; transform: scale(0) translateY(0);
        }

        .leaf.active { opacity: 1; transform: scale(1); }
        .leaf.wither { transform: translateY(200px) rotate(45deg); opacity: 0; }

        .status-bar {
            background: white; padding: 10px 20px; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .progress-bg { flex-grow: 1; height: 10px; background: #eee; border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--ghibli-leaf); transition: 0.4s; }

        .game-container {
            background: rgba(255, 255, 255, 0.95); border: 4px solid var(--ghibli-green);
            border-radius: 25px; padding: 25px; text-align: center; min-height: 480px;
            display: flex; flex-direction: column;
        }

        .word-seed {
            background: white; border: 2px solid var(--ghibli-leaf); border-radius: 15px;
            padding: 15px; cursor: pointer; transition: 0.2s; font-size: 1.3rem;
            font-weight: 600; color: #333;
        }
        .word-seed:hover { transform: translateY(-3px); background: #f0fdf4; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .controls button {
            background: var(--ghibli-dark-green); color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-weight: 600; cursor: pointer; 
            margin-top: auto; font-size: 1.1rem;
        }

        #feedback { margin-top:20px; font-weight:bold; min-height:30px; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1>Khu Vườn Tiếng Trung: Bài 7 🌿</h1>
</header>

<div class="main-layout">
    <div class="game-side">
        <div class="status-bar">
            <span>Điểm: <b id="score">0</b></span>
            <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="level-indicator">1/20</span>
        </div>

        <div class="game-container">
            <div id="quiz-area">
                <div id="hint-box" style="font-weight: 600; color: var(--ghibli-wood); margin-bottom: 20px;"></div>
                <div id="question-text" style="font-size: 2rem; font-weight: bold; margin: 20px 0;"></div>
                <div id="word-bank" class="options-grid"></div>
                <div class="controls">
                    <button id="main-btn" onclick="nextQuestion()" style="display:none">Tiếp theo ➔</button>
                </div>
            </div>

            <div id="result-area" style="display:none; padding: 40px;">
                <h2 style="color: var(--ghibli-dark-green);">Nga thật tuyệt vời! 🌸</h2>
                <p id="final-msg" style="font-size: 1.3rem;"></p>
                <button onclick="location.reload()" style="background:var(--ghibli-wood); color:white; border:none; padding:15px 35px; border-radius:25px; cursor:pointer;">Học lại Bài 7</button>
            </div>
            
            <div id="feedback"></div>
        </div>
    </div>

    <div class="tree-side">
        <div id="tree-container">
            <div class="trunk"></div>
            <div id="leaf-box" class="leaf-container"></div>
        </div>
        <div style="font-weight: 600; color: var(--ghibli-dark-green); margin-top: 20px; font-size: 1.1rem;">Giúp Nga trồng cây nhé</div>
    </div>
</div>

<audio id="sfx-win" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sfx-lose" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script>
    const levels = [
        { q: "Hôm nay là ngày mấy?", hint: "Học từ mới (Ngày - văn nói):", correct: "号 (hào)", options: ["号 (hào)", "日 (rì)", "月 (yuè)", "年 (nián)"] },
        { q: "qǐng", hint: "Từ mới: (Lịch sự) mời, xin:", correct: "请", options: ["请", "问", "去", "看"] },
        { q: "Hôm qua", hint: "Từ mới chỉ thời gian:", correct: "昨天 (zuótiān)", options: ["昨天 (zuótiān)", "今天 (jīntiān)", "明天 (míngtiān)", "星期 (xīngqī)"] },
        { q: "Thứ tư, ngày 1 tháng 9", hint: "Sắp xếp theo thứ tự Trung Quốc (Lớn -> Nhỏ):", correct: "9月1号, 星期三", options: ["9月1号, 星期三", "星期三, 9月1号", "1号9月, 星期三", "9月星期三, 1号"] },
        { q: "Trường học", hint: "Nơi để học tập:", correct: "学校 (xuéxiào)", options: ["学校 (xuéxiào)", "书店 (shūdiàn)", "看书 (kànshū)", "去学校"] },
        { q: "Tôi đi trường học đọc sách", hint: "Cấu trúc liên động: 去 + Địa điểm + Hành động:", correct: "我去学校看书", options: ["我去学校看书", "我学校去看书", "我看书去学校", "去学校我看书"] },
        { q: "xīngqī", hint: "Từ chỉ đơn vị thời gian (Tuần/Thứ):", correct: "星期", options: ["星期", "月", "号", "天"] },
        { q: "Mời hỏi/Cho hỏi...", hint: "Cụm từ lịch sự khi bắt đầu câu hỏi:", correct: "请问 (qǐngwèn)", options: ["请问 (qǐngwèn)", "问请", "去问", "看问"] },
        { q: "Ngày mai là thứ tư", hint: "Câu vị ngữ danh từ (không cần 'shì'):", correct: "明天星期三", options: ["明天星期三", "明天是星期三", "星期三明天", "明天有星期三"] },
        { q: "Tháng", hint: "Từ mới (Hình trăng khuyết):", correct: "月 (yuè)", options: ["月 (yuè)", "日 (rì)", "号 (hào)", "年 (nián)"] },
        { q: "míngtiān", hint: "Ngày sau ngày hôm nay:", correct: "明天", options: ["明天", "昨天", "今天", "后天"] },
        { q: "Xem sách/Đọc sách", hint: "Dùng dgt 'kàn' + dt 'shū':", correct: "看书 (kànshū)", options: ["看书 (kànshū)", "写书", "喝书", "去书"] },
        { q: "Trong văn viết, 'Ngày' dùng từ gì?", hint: "Lưu ý ngữ pháp Bài 7:", correct: "日 (rì)", options: ["日 (rì)", "号 (hào)", "月 (yuè)", "天 (tiān)"] },
        { q: "Tôi đi Trung Quốc học tiếng Hán", hint: "Dịch sang tiếng Trung đúng cấu trúc:", correct: "我去中国学习汉语", options: ["我去中国学习汉语", "我学习汉语去中国", "去中国我学习汉语", "我中国去学习汉语"] },
        { q: "Hôm nay ngày 1 tháng 9", hint: "Câu vị ngữ danh từ:", correct: "今天9月1号", options: ["今天9月1号", "今天是有9月1号", "9月1号今天", "今天号1月9"] },
        { q: "wèn", hint: "Động từ 'Hỏi':", correct: "问", options: ["问", "门", "请", "叫"] },
        { q: "qù", hint: "Động từ 'Đi đến':", correct: "去", options: ["去", "云", "看", "学"] },
        { q: "Thứ/Tuần", hint: "Hệ thống lại từ mới:", correct: "星期 (xīngqī)", options: ["星期 (xīngqī)", "星月", "期星", "天期"] },
        { q: "Hôm nay", hint: "Thời gian hiện tại:", correct: "今天 (jīntiān)", options: ["今天 (jīntiān)", "昨天", "明天", "今年"] },
        { q: "Sách", hint: "Vật dụng dùng để 'kàn':", correct: "书 (shū)", options: ["书 (shū)", "看", "学", "校"] }
    ];

    let current = 0;
    let score = 0;
    const leafIcons = ["🍃", "🌿", "🍀", "🌱", "🍃"];

    // Khởi tạo lá (ẩn sẵn)
    function initLeaves() {
        const box = document.getElementById('leaf-box');
        for (let i = 0; i < 20; i++) {
            const l = document.createElement('span');
            l.className = 'leaf';
            l.id = `leaf-${i}`;
            l.innerText = leafIcons[i % leafIcons.length];
            box.appendChild(l);
        }
    }

    function addLeaf() {
        const leaf = document.getElementById(`leaf-${current}`);
        if(leaf) leaf.classList.add('active');
    }

    function dropLeaf() {
        // Tìm lá gần nhất đang 'active' để rụng
        for(let i = current; i >= 0; i--) {
            const leaf = document.getElementById(`leaf-${i}`);
            if(leaf && leaf.classList.contains('active')) {
                leaf.classList.add('wither');
                setTimeout(() => {
                    leaf.classList.remove('active', 'wither');
                }, 1000);
                break;
            }
        }
    }

    function initLevel() {
        if (current >= levels.length) return showFinal();
        
        const lv = levels[current];
        document.getElementById('hint-box').innerText = lv.hint;
        document.getElementById('question-text').innerText = lv.q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('main-btn').style.display = "none";
        document.getElementById('level-indicator').innerText = `${current + 1}/${levels.length}`;
        document.getElementById('progress-fill').style.width = `${(current / levels.length) * 100}%`;

        const bank = document.getElementById('word-bank');
        bank.innerHTML = '';
        
        [...lv.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'word-seed';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            bank.appendChild(btn);
        });
    }

    function checkAnswer(selected, element) {
        if (document.getElementById('main-btn').style.display === "block") return;

        const lv = levels[current];
        if (selected === lv.correct) {
            score += 10;
            document.getElementById('sfx-win').play();
            document.getElementById('feedback').innerHTML = "<span style='color:green'>Chính xác! Cây mọc thêm lá rồi! ✨</span>";
            element.style.background = "#dcfce7";
            addLeaf();
        } else {
            document.getElementById('sfx-lose').play();
            document.getElementById('feedback').innerHTML = "<span style='color:red'>Sai rồi! Lá bị héo rụng mất rồi... 🎋</span>";
            element.style.background = "#fee2e2";
            dropLeaf();
        }
        document.getElementById('score').innerText = score;
        document.getElementById('main-btn').style.display = "block";
    }

    function nextQuestion() {
        current++;
        initLevel();
    }

    function showFinal() {
        document.getElementById('quiz-area').style.display = "none";
        document.getElementById('result-area').style.display = "block";
        document.getElementById('final-msg').innerHTML = `Nga đã hoàn thành Bài 7!<br>Số điểm: <b>${score}</b><br>Khu vườn của Nga thật xinh đẹp!`;
    }

    window.onload = () => {
        initLeaves();
        initLevel();
    };
</script>
</body>
</html>
