<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Tiếng Trung - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
        }

        body {
            margin: 0; font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky) url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 15px; background: rgba(255, 255, 255, 0.85);
            width: 100%; border-bottom: 5px solid var(--ghibli-green); backdrop-filter: blur(5px);
        }

        .main-layout {
            display: flex; gap: 20px; width: 95%; max-width: 1100px; margin: 20px auto;
        }

        .game-side { flex: 2; }
        
        .tree-side {
            flex: 1; background: rgba(255, 255, 255, 0.85);
            border: 3px solid white; border-radius: 25px;
            height: 500px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding-bottom: 40px; position: sticky; top: 20px;
        }

        #the-tree { 
            font-size: 80px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom center;
        }

        .status-bar {
            background: white; padding: 10px 20px; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .progress-bg { flex-grow: 1; height: 10px; background: #eee; border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #7fb069; transition: 0.4s; }

        .game-container {
            background: rgba(255, 255, 255, 0.95); border: 4px solid var(--ghibli-green);
            border-radius: 25px; padding: 25px; text-align: center; min-height: 450px;
            display: flex; flex-direction: column;
        }

        .word-seed {
            background: white; border: 2px solid #7fb069; border-radius: 15px;
            padding: 15px; cursor: pointer; transition: 0.2s; font-size: 1.4rem;
            font-weight: 600;
        }
        .word-seed:hover { transform: translateY(-3px); background: #f0fdf4; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .controls button {
            background: var(--ghibli-dark-green); color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: auto;
        }

        #result-area { display: none; padding: 30px; }
    </style>
</head>
<body>

<header>
    <h1>Khu Vườn Tiếng Trung Của Nga 🌿</h1>
</header>

<div class="main-layout">
    <div class="game-side">
        <div class="status-bar">
            <span>Điểm: <b id="score">0</b></span>
            <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="level-indicator">1/30</span>
        </div>

        <div class="game-container">
            <div id="quiz-area">
                <div id="hint-box" style="font-weight: 600; color: var(--ghibli-wood); margin-bottom: 15px;"></div>
                <div id="question-text" style="font-size: 2rem; font-weight: bold; margin-bottom: 20px;"></div>
                <div id="word-bank" class="options-grid"></div>
                <div class="controls">
                    <button id="main-btn" onclick="nextQuestion()" style="display:none">Tiếp theo ➔</button>
                </div>
            </div>

            <div id="result-area">
                <h2 style="color: var(--ghibli-dark-green);">Chúc mừng Nga! 🌸</h2>
                <p id="final-msg" style="font-size: 1.2rem;"></p>
                <button onclick="location.reload()" style="background:var(--ghibli-wood); color:white; border:none; padding:12px 25px; border-radius:20px; cursor:pointer;">Luyện tập lại</button>
            </div>
            
            <div id="feedback" style="margin-top:20px; font-weight:bold; min-height:24px;"></div>
        </div>
    </div>

    <div class="tree-side">
        <div id="the-tree">🌱</div>
        <div style="font-weight: 600; color: var(--ghibli-dark-green); margin-top: 20px;">Cây của Nga</div>
    </div>
</div>

<audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script>
    // DANH SÁCH 30 CÂU HỎI KHÁC NHAU HOÀN TOÀN
    const levels = [
        { q: "lǎoshī", hint: "Chọn chữ Hán của 'Giáo viên':", correct: "老师", options: ["老师", "老帅", "教师", "学生"] },
        { q: "zàijiàn", hint: "Chọn chữ Hán của 'Tạm biệt':", correct: "再见", options: ["再见", "见再", "你好", "谢谢"] },
        { q: "Hào (Ngày)", hint: "Hôm nay ngày mấy? (jǐ hào):", correct: "号", options: ["号", "日", "月", "天"] },
        { q: "nǐ hǎo", hint: "Lời chào cơ bản nhất:", correct: "你好", options: ["你好", "您好", "你们", "大家好"] },
        { q: "xièxie", hint: "Khi ai đó giúp đỡ bạn:", correct: "谢谢", options: ["谢谢", "不客气", "对不起", "没关系"] },
        { q: "māma", hint: "Người phụ nữ tuyệt vời nhất:", correct: "妈妈", options: ["妈妈", "爸爸", "奶奶", "姐姐"] },
        { q: "bàba", hint: "Trụ cột gia đình:", correct: "爸爸", options: ["爸爸", "爷爷", "哥哥", "弟弟"] },
        { q: "Zhōngguó", hint: "Quốc gia dùng tiếng Trung:", correct: "中国", options: ["中国", "越南", "美国", "英国"] },
        { q: "rén", hint: "Một nét phẩy, một nét mác:", correct: "人", options: ["人", "大", "天", "口"] },
        { q: "míngzi", hint: "Bạn tên là gì? (Nǐ jiào shénme...):", correct: "名字", options: ["名字", "名子", "老师", "学生"] },
        { q: "xuéshēng", hint: "Người đi học gọi là:", correct: "学生", options: ["学生", "老师", "医生", "朋友"] },
        { q: "Yī (Số 1)", hint: "Một gạch ngang:", correct: "一", options: ["一", "二", "三", "十"] },
        { q: "Sān (Số 3)", hint: "Ba gạch ngang:", correct: "三", options: ["三", "二", "四", "五"] },
        { q: "Wǔ (Số 5)", hint: "Số 5 viết là:", correct: "五", options: ["五", "四", "六", "八"] },
        { q: "Bā (Số 8)", hint: "Số phát tài:", correct: "八", options: ["八", "九", "七", "六"] },
        { q: "Shí (Số 10)", hint: "Hình dấu cộng:", correct: "十", options: ["十", "千", "万", "土"] },
        { q: "Yuè (Tháng)", hint: "Hình trăng khuyết:", correct: "月", options: ["月", "日", "号", "年"] },
        { q: "Rì (Ngày)", hint: "Hình mặt trời:", correct: "日", options: ["日", "月", "目", "口"] },
        { q: "hē", hint: "Hành động uống nước:", correct: "喝", options: ["喝", "吃", "看", "听"] },
        { q: "chī", hint: "Hành động ăn cơm:", correct: "吃", options: ["吃", "喝", "叫", "写"] },
        { q: "chá", hint: "Thức uống phổ biến ở Trung Quốc:", correct: "茶", options: ["茶", "水", "咖啡", "牛奶"] },
        { q: "mǐfàn", hint: "Cơm trắng:", correct: "米饭", options: ["米饭", "面条", "包子", "饺子"] },
        { q: "shuǐ", hint: "70% cơ thể là:", correct: "水", options: ["水", "冰", "火", "木"] },
        { q: "pingguǒ", hint: "Quả táo:", correct: "苹果", options: ["苹果", "香蕉", "西瓜", "芒果"] },
        { q: "yīshēng", hint: "Người làm việc ở bệnh viện:", correct: "医生", options: ["医生", "老师", "司机", "警察"] },
        { q: "yiyuàn", hint: "Bệnh viện:", correct: "医院", options: ["医院", "学校", "饭店", "商店"] },
        { q: "shāngdiàn", hint: "Nơi để mua sắm:", correct: "商店", options: ["商店", "书店", "超市", "市场"] },
        { q: "mǎi", hint: "Hành động mua:", correct: "买", options: ["买", "卖", "看", "给"] },
        { q: "duōshao", hint: "Hỏi về số lượng/giá cả:", correct: "多少", options: ["多少", "什么", "怎么", "哪个"] },
        { q: "qián", hint: "Dùng để mua đồ:", correct: "钱", options: ["钱", "金", "纸", "银"] }
    ];

    let current = 0;
    let score = 0;
    let treeLevel = 0;

    function updateTree() {
        const tree = document.getElementById('the-tree');
        const scale = 1 + (treeLevel * 0.08); 
        tree.style.transform = `scale(${scale})`;

        if (treeLevel >= 30) tree.innerText = "🌸";
        else if (treeLevel > 20) tree.innerText = "🌳";
        else if (treeLevel > 10) tree.innerText = "🪴";
        else if (treeLevel > 5) tree.innerText = "🌿";
        else tree.innerText = "🌱";
    }

    function initLevel() {
        const lv = levels[current];
        document.getElementById('hint-box').innerText = lv.hint;
        document.getElementById('question-text').innerText = lv.q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('main-btn').style.display = "none";
        document.getElementById('level-indicator').innerText = `${current + 1}/${levels.length}`;
        document.getElementById('progress-fill').style.width = `${(current / levels.length) * 100}%`;

        const bank = document.getElementById('word-bank');
        bank.innerHTML = '';
        
        [...lv.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'word-seed';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            bank.appendChild(btn);
        });
    }

    function checkAnswer(selected, element) {
        if (document.getElementById('main-btn').style.display === "block") return;

        const lv = levels[current];
        if (selected === lv.correct) {
            score += 20;
            treeLevel++;
            document.getElementById('sfx-correct').play();
            document.getElementById('feedback').innerHTML = "<span style='color:green'>Tuyệt vời! Cây lớn thêm rồi! ✨</span>";
            element.style.background = "#dcfce7";
            element.style.borderColor = "#22c55e";
            updateTree();
        } else {
            document.getElementById('sfx-wrong').play();
            document.getElementById('feedback').innerHTML = "<span style='color:red'>Sai rồi, Nga cố gắng câu sau nhé! 🎋</span>";
            element.style.background = "#fee2e2";
            element.style.borderColor = "#ef4444";
        }
        document.getElementById('score').innerText = score;
        document.getElementById('main-btn').style.display = "block";
    }

    function nextQuestion() {
        current++;
        if (current < levels.length) {
            initLevel();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-area').style.display = "none";
        document.getElementById('result-area').style.display = "block";
        document.getElementById('final-msg').innerHTML = `Nga đã hoàn thành 30 câu hỏi!<br>Tổng điểm: <b>${score}</b><br>Khu vườn của Nga thật rực rỡ!`;
    }

    window.onload = () => {
        updateTree();
        initLevel();
    };
</script>
</body>
</html>
