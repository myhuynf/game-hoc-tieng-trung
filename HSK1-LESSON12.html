    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volume = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const vocabList = [

        ];

        const questions = [
            { q: "Từ 天气 (tiānqì) có nghĩa là gì?", options: ["Thời tiết", "Sức khỏe", "Hôm nay", "Ngày mai"], answer: 0, icon: "🌤️", explain: "Tiānqì (天气) nghĩa là thời tiết." },
            { q: "Dịch: 明天天气怎么样？", options: ["Thời tiết ngày mai thế nào?", "Hôm nay trời đẹp không?", "Khi nào trời mưa?", "Bạn khỏe không?"], answer: 0, icon: "📅", explain: "Míngtiān (Ngày mai) + tiānqì (thời tiết) + zěnmeyàng (thế nào)." },
            { q: "Trái nghĩa với '冷' (lěng - Lạnh) là gì?", options: ["热 (rè)", "下雨 (xià yǔ)", "水 (shuǐ)", "来 (lái)"], answer: 0, icon: "🔥", explain: "Lěng (冷) là lạnh, rè (热) là nóng." },
            { q: "Từ nào nghĩa là 'Cô/Chị' (cách gọi lịch sự)?", options: ["小姐 (xiǎojiě)", "先生 (xiānsheng)", "学生 (xuésheng)", "老师 (lǎoshī)"], answer: 0, icon: "👩", explain: "Xiǎojiě (小姐) dùng để gọi phụ nữ trẻ một cách lịch sự." },
            { q: "Dịch: 'Sức khỏe tôi không tốt lắm'", options: ["我身体不太好", "我很热", "我想吃水果", "他在北京"], answer: 0, icon: "🤒", explain: "Shēntǐ (身体) là sức khỏe, bù tài hǎo (不太好) là không tốt lắm." },
            { q: "Từ '太' (tài) trong '太热了' có nghĩa là gì?", options: ["Quá/Lắm", "Cũng", "Vẫn", "Hơi"], answer: 0, icon: "📈", explain: "Cấu trúc '太 + Tính từ + 了' dùng để biểu thị mức độ cao (Quá...)." },

            { q: "Từ '来' (lái) có nghĩa là gì?", options: ["Đến/Tới", "Đi", "Ngồi", "Xem"], answer: 0, icon: "🏃", explain: "Lái (来) có nghĩa là đến hoặc tới một địa điểm nào đó." },
            { q: "Để hỏi thăm sức khỏe: 你___怎么样？", options: ["身体", "天气", "水果", "小姐"], answer: 0, icon: "💪", explain: "Dùng 'shēntǐ' (sức khỏe/cơ thể) trong câu hỏi thăm này." },
            { q: "Dịch: 'Mời uống nước'", options: ["请喝水", "请喝茶", "请吃水果", "请来北京"], answer: 0, icon: "🥛", explain: "Qǐng (mời) + hē (uống) + shuǐ (nước)." },
            { q: "Cấu trúc nào sau đây đúng ngữ pháp?", options: ["太冷了", "冷太了", "太了冷", "了太冷"], answer: 0, icon: "📝", explain: "Cấu trúc chuẩn là '太 + Tính từ + 了'." },
            { q: "Dịch: 'Một ít hoa quả'", options: ["一些水果", "个水果", "大水果", "来水果"], answer: 0, icon: "🧺", explain: "Xiē (些) là lượng từ chỉ một số, một ít." },
            { q: "Từ '怎么样' (zěnmeyàng) dùng để hỏi về điều gì?", options: ["Hỏi tính chất/trạng thái", "Hỏi số lượng", "Hỏi danh tính", "Hỏi địa điểm"], answer: 0, icon: "❓", explain: "Zěnmeyàng dùng để hỏi về trạng thái hoặc tính chất của sự vật/sự việc." },

            { q: "Dịch: 'Không lạnh lắm'", options: ["不太冷", "很冷", "太冷了", "不冷"], answer: 0, icon: "❄️", explain: "Cấu trúc '不太 + Tính từ' có nghĩa là không... lắm." },
            { q: "Điền từ: 明天___下雨 (Ngày mai sẽ mưa).", options: ["会", "是", "在", "有"], answer: 0, icon: "🔮", explain: "Huì (会) dùng để chỉ khả năng hoặc một sự việc sẽ xảy ra trong tương lai." },

        let currentQuestion = 0, score = 0, fcIndex = 0, currentCards = [], fcForgotten = [], fcKnownCount = 0, isFlipped = false, hasAnswered = false;

        function goHome() { location.reload(); }

        function startFlashcard(list) {
            currentCards = [...list]; fcIndex = 0; fcForgotten = []; fcKnownCount = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('fc-end-screen').classList.add('hidden');
            document.getElementById('flashcard-screen').classList.remove('hidden');
            document.getElementById('flashcard-screen').classList.add('flex');
            updateFcCounters();
            loadCard();
        }

        function updateFcCounters() {
            document.getElementById('count-known').innerText = fcKnownCount;
            document.getElementById('count-unknown').innerText = fcForgotten.length;
        }

        function loadCard() {
            if (fcIndex >= currentCards.length) { showFcEndScreen(); return; }
            isFlipped = false;
            document.getElementById('fc-inner').classList.remove('rotate-y-180');
            const c = currentCards[fcIndex];
            document.getElementById('fc-zh').innerText = c.zh;
            document.getElementById('fc-py').innerText = c.pinyin;
            document.getElementById('fc-vi').innerText = c.vi;
            document.getElementById('fc-ex-zh').innerText = c.ex_zh;
            document.getElementById('fc-ex-py').innerText = c.ex_py;
            document.getElementById('fc-ex-vi').innerText = c.ex_vi;
            document.getElementById('fc-current').innerText = fcIndex + 1;
            document.getElementById('fc-total').innerText = currentCards.length;
        }

        function flipCard() { isFlipped = !isFlipped; document.getElementById('fc-inner').classList.toggle('rotate-y-180'); }

        function markCard(rem) { 
            if (!rem) fcForgotten.push(currentCards[fcIndex]);
            else fcKnownCount++;
            fcIndex++; 
            updateFcCounters();
            loadCard(); 
        }

        function showFcEndScreen() {
            document.getElementById('flashcard-screen').classList.add('hidden');
            const screen = document.getElementById('fc-end-screen');
            screen.classList.remove('hidden'); screen.classList.add('flex');
            
            document.getElementById('final-known').innerText = fcKnownCount;
            document.getElementById('final-unknown').innerText = fcForgotten.length;
            document.getElementById('final-total').innerText = currentCards.length;

            const listDiv = document.getElementById('forgotten-list');
            const box = document.getElementById('forgotten-box');
            const msg = document.getElementById('all-remembered-msg');
            const btnRetry = document.getElementById('btn-retry-forgotten');

            if (fcForgotten.length > 0) {
                box.classList.remove('hidden');
                msg.classList.add('hidden');
                btnRetry.classList.remove('hidden');
                listDiv.innerHTML = fcForgotten.map(c => `
                    <div class="bg-white p-3 rounded-xl border border-red-100 flex justify-between items-center shadow-sm">
                        <div>
                            <span class="chinese-text font-bold text-lg text-gray-800">${c.zh}</span>
                            <span class="text-sm text-gray-400 ml-2">${c.pinyin}</span>
                        </div>
                        <span class="text-blue-600 font-semibold">${c.vi}</span>
                    </div>
                `).join('');
            } else {
                box.classList.add('hidden');
                msg.classList.remove('hidden');
                btnRetry.classList.add('hidden');
            }
        }

        function retryForgotten() { startFlashcard(fcForgotten); }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-header').classList.remove('hidden');
            currentQuestion = 0; score = 0;
            document.getElementById('score').innerText = score;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-icon').innerText = q.icon;
            document.getElementById('current-q').innerText = currentQuestion + 1;
            document.getElementById('progress-bar').style.width = `${((currentQuestion) / questions.length) * 100}%`;
            
            document.getElementById('explanation-container').classList.add('hidden');

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const optsWithStatus = q.options.map((text, i) => ({ text, isCorrect: i === q.answer }));
            const shuffledOpts = [...optsWithStatus].sort(() => Math.random() - 0.5);

            shuffledOpts.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn bg-white border-2 border-blue-100 p-4 rounded-2xl text-left font-semibold text-gray-700 transition-all hover:border-blue-300';
                btn.innerText = opt.text;
                btn.onclick = () => checkAnswer(opt.isCorrect, btn);
                container.appendChild(btn);
            });
            document.getElementById('next-btn').classList.add('hidden');
        }

        function checkAnswer(isCorrect, btn) {
            if (hasAnswered) return;
            hasAnswered = true;
            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (isCorrect) {
                btn.classList.add('correct-ans');
                score += 10;
                playTone(523, 'sine', 0.1, 0.2); 
            } else {
                btn.classList.add('wrong-ans');
                allBtns.forEach(b => {
                    const originalQ = questions[currentQuestion];
                    if (b.innerText === originalQ.options[originalQ.answer]) {
                        b.classList.add('correct-ans');
                    }
                });
                score -= 5;
                playTone(150, 'sawtooth', 0.3, 0.2);
                document.getElementById('game-container').classList.add('shake-hard');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake-hard'), 400);
            }

            document.getElementById('explanation-text').innerText = q.explain;
            document.getElementById('explanation-container').classList.remove('hidden');

            document.getElementById('score').innerText = score;
            document.getElementById('next-btn').classList.remove('hidden');
            
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) loadQuestion();
            else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('game-header').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('end-screen').classList.add('flex');
                document.getElementById('final-score').innerText = score;
                if (score > 150) {
                    document.getElementById('end-emoji').innerText = "👑";
                    playTone(523, 'sine', 0.1, 0.2);
                    playTone(659, 'sine', 0.1, 0.2);
                    playTone(783, 'sine', 0.3, 0.2);
                } else if (score < 0) {
                    document.getElementById('end-emoji').innerText = "💀";
                }
            }
        }
    </script>
</body>
</html>
